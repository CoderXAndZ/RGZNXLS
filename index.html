};

async function loadQuestionsData() {
  if (window.QUESTIONS_DATA) {
    return window.QUESTIONS_DATA;
  }
  const res = await fetch('questions.json');
  return res.json();
}

async function init() {
  try {
    const data = await loadQuestionsData();
    allQuestions = data.questions;
    chapters = data.chapters || [];
    chapterMap = Object.fromEntries(chapters.map((c) => [c.id, c.name]));

    document.getElementById('page-title').textContent = data.title;
    document.getElementById('page-subtitle').textContent =
      `共 ${data.total} 道题 · ${chapters.length} 个章节 · 单选/多选/判断`;

    populateChapterFilters();
    applyFilter();
    applyStudyFilter();
    updateWrongBadge();
  } catch (e) {
    document.getElementById('question-list').innerHTML =
      '<div class="loading">加载题目失败，请确保 questions.js 存在。<br>可运行 python3 parse_docx.py 重新生成。</div>';
  }
}

function populateChapterFilters() {
  const options =
    '<option value="all">全部章节</option>' +
    chapters
      .map((c) => {
        const count = allQuestions.filter((q) => q.chapter === c.id).length;
        return `<option value="${c.id}">${c.name}（${count}）</option>`;
      })
      .join('');

  document.getElementById('chapter-filter').innerHTML = options;
  document.getElementById('study-chapter-filter').innerHTML = options;
}

function getChapterName(id) {
  return chapterMap[id] || '综合其他';
}

function getWrongBook() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  } catch {
    return {};
  }
}

function saveWrongBook(book) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(book));
  updateWrongBadge();
}

function addToWrongBook(question, userAnswer) {
  const book = getWrongBook();
  const key = String(question.id);
  const correctIds = question.options.filter((o) => o.correct).map((o) => o.id);

  if (!book[key]) {
    book[key] = {
      questionId: question.id,
      wrongCount: 0,
      lastWrongAt: null,
      lastUserAnswer: null,
    };
  }
  book[key].wrongCount += 1;
  book[key].lastWrongAt = Date.now();
  book[key].lastUserAnswer = userAnswer;
  book[key].correctIds = correctIds;
  saveWrongBook(book);
}

function clearWrongBook() {
  if (confirm('确定清空全部错题集吗？')) {
    localStorage.removeItem(STORAGE_KEY);
    updateWrongBadge();
    if (mode === 'wrongbook') renderWrongBook();
  }
}

function updateWrongBadge() {
  const count = Object.keys(getWrongBook()).length;
  const badge = document.getElementById('wrong-badge');
  if (count > 0) {
    badge.textContent = count;
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }
}

function applyFilter() {
  const chapterFilter = document.getElementById('chapter-filter').value;
  const typeFilter = document.getElementById('type-filter').value;
  const orderFilter = document.getElementById('order-filter').value;
  const countFilter = document.getElementById('count-filter').value;

  let filtered = [...allQuestions];

  if (chapterFilter !== 'all') {
    filtered = filtered.filter((q) => q.chapter === chapterFilter);
  }
  if (typeFilter !== 'all') {
    filtered = filtered.filter((q) => q.type === typeFilter);
  }

  if (orderFilter === 'random') {
    filtered = shuffle(filtered);
  } else if (orderFilter === 'id-desc') {
    filtered.sort((a, b) => b.id - a.id);
  } else {
    filtered.sort((a, b) => a.id - b.id);
  }

  if (countFilter !== 'all') {
    filtered = filtered.slice(0, parseInt(countFilter, 10));
  }

  currentQuestions = filtered;
  checkedMap = {};
  renderQuestions();
  updateStats();
}

function applyStudyFilter() {
  const chapterFilter = document.getElementById('study-chapter-filter').value;
  const typeFilter = document.getElementById('study-type-filter').value;

  let filtered = [...allQuestions];
  if (chapterFilter !== 'all') {
    filtered = filtered.filter((q) => q.chapter === chapterFilter);
  }
  if (typeFilter !== 'all') {
    filtered = filtered.filter((q) => q.type === typeFilter);
  }
  filtered.sort((a, b) => a.id - b.id);

  studyQuestions = filtered;
  studyIndex = 0;
  document.getElementById('study-stat-total').textContent = studyQuestions.length;

  const viewMode = document.getElementById('study-view-mode').value;
  if (viewMode === 'card') {
    renderStudyCard();
  } else {
    renderStudyList();
  }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderQuestions() {
  const list = document.getElementById('question-list');
  if (currentQuestions.length === 0) {
    list.innerHTML =
      '<div class="empty-state"><div class="icon">📝</div><p>没有符合条件的题目</p></div>';
    return;
  }

  list.innerHTML = currentQuestions
    .map((q, idx) => renderQuestionCard(q, idx, false))
    .join('');

  bindQuestionEvents(list);
}

function renderQuestionCard(q, idx, showAnswer) {
  const isMultiple = q.type === 'multiple';
  const inputType = isMultiple ? 'checkbox' : 'radio';
  const name = `q-${q.id}`;
  const isChecked = !!checkedMap[q.id];
  const chapterTag = getChapterName(q.chapter);

  const optionsHtml = q.options
    .map((opt) => {
      let cls = 'option';
      if (showAnswer && opt.correct) cls += ' correct-answer';
      if (isChecked) cls += ' disabled';

      return `
        <label class="${cls}" data-qid="${q.id}" data-oid="${opt.id}">
          <input type="${inputType}" name="${name}" value="${opt.id}" ${isChecked ? 'disabled' : ''} />
          <span class="option-label">${opt.id}.</span>
          <span class="option-text">${escapeHtml(opt.text)}</span>
        </label>`;
    })
    .join('');

  const confirmBtn =
    isMultiple && !isChecked
      ? `<button class="btn btn-primary btn-confirm" data-qid="${q.id}">确认答案</button>`
      : '';

  return `
    <div class="question-card unchecked" id="card-${q.id}" data-id="${q.id}">
      <div class="q-header">
        <span class="q-num">第 ${idx + 1} 题（原题号 ${q.id}）</span>
        <span class="q-chapter">${escapeHtml(chapterTag)}</span>
        <span class="q-type ${q.type}">${TYPE_LABELS[q.type]}</span>
        ${hasExplanation(q) ? '<span class="q-has-exp">含解析</span>' : ''}
      </div>
      <div class="q-stem">${escapeHtml(q.stem)}</div>
      <div class="options">${optionsHtml}</div>
      ${confirmBtn ? `<div class="confirm-row">${confirmBtn}</div>` : ''}
      <div class="result-badge" id="result-${q.id}"></div>
      <div class="explanation-box hidden" id="explanation-${q.id}"></div>
    </div>`;
}

function bindQuestionEvents(container) {
  container.querySelectorAll('.option input').forEach((input) => {
    const el = input.closest('.option');
    const qid = Number(el.dataset.qid);
    const q = currentQuestions.find((x) => x.id === qid);
    if (!q || checkedMap[qid]) return;

    input.addEventListener('change', () => {
      if (checkedMap[qid]) return;
      syncOptionStyle(el.closest('.options'));
      if (q.type !== 'multiple') {
        checkQuestion(qid);
      }
    });
  });

  container.querySelectorAll('.btn-confirm').forEach((btn) => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      checkQuestion(Number(btn.dataset.qid));
    });
  });
}

function syncOptionStyle(optionsEl) {
  optionsEl.querySelectorAll('.option').forEach((opt) => {
    opt.classList.toggle('selected', opt.querySelector('input').checked);
  });
}

function getUserAnswer(qid) {
  const inputs = document.querySelectorAll(`input[name="q-${qid}"]:checked`);
  return Array.from(inputs)
    .map((i) => i.value)
    .sort();
}

function getCorrectAnswer(q) {
  return q.options
    .filter((o) => o.correct)
    .map((o) => o.id)
    .sort();
}

function formatAnswer(q, ids) {
  return ids
    .map((id) => {
      const opt = q.options.find((o) => o.id === id);
      return opt ? `${id}. ${opt.text}` : id;
    })
    .join('；');
}

function hasExplanation(q) {
  const exp = q.explanation;
  if (!exp) return false;
  return !!(exp.text || (exp.images && exp.images.length));
}

function renderExplanationHtml(q) {
  const exp = q.explanation;
  if (!hasExplanation(q)) return '';

  let html = '<div class="explanation-title">📖 答案解析</div>';
  if (exp.text) {
    html += `<div class="explanation-text">${escapeHtml(exp.text).replace(/\n/g, '<br>')}</div>`;
  }
  if (exp.images && exp.images.length) {
    html += exp.images
      .map((src) => `<img class="explanation-img" src="${src}" alt="解析图片" loading="lazy" />`)
      .join('');
  }
  return html;
}

function checkQuestion(qid) {
  if (checkedMap[qid]) return;

  const q = currentQuestions.find((x) => x.id === qid);
  if (!q) return;

  const userAns = getUserAnswer(qid);
  if (userAns.length === 0) {
    if (q.type === 'multiple') {
      alert('请至少选择一个选项');
    }
    return;
  }

  const correctAns = getCorrectAnswer(q);
  const isCorrect = arraysEqual(userAns, correctAns);

  checkedMap[qid] = { correct: isCorrect, userAnswer: userAns };
  revealQuestionResult(q, userAns, isCorrect);
  updateStats();
}

function revealQuestionResult(q, userAns, isCorrect) {
  const card = document.getElementById(`card-${q.id}`);
  const resultEl = document.getElementById(`result-${q.id}`);
  const correctAns = getCorrectAnswer(q);

  card.querySelectorAll('.option').forEach((opt) => {
    opt.classList.add('disabled');
    const oid = opt.dataset.oid;
    const input = opt.querySelector('input');
    input.disabled = true;

    if (q.options.find((o) => o.id === oid)?.correct) {
      opt.classList.add('correct-answer');
    }
    if (input.checked && !q.options.find((o) => o.id === oid)?.correct) {
      opt.classList.add('wrong-answer');
    }
  });

  const confirmBtn = card.querySelector('.btn-confirm');
  if (confirmBtn) confirmBtn.remove();

  card.classList.remove('unchecked');
  card.classList.add(isCorrect ? 'correct' : 'wrong');
  resultEl.className = `result-badge show ${isCorrect ? 'correct' : 'wrong'}`;

  if (isCorrect) {
    resultEl.textContent = '✓ 回答正确';
  } else {
    resultEl.textContent = `✗ 回答错误。你的答案：${formatAnswer(q, userAns)}；正确答案：${formatAnswer(q, correctAns)}`;
    addToWrongBook(q, userAns);
  }

  const expEl = document.getElementById(`explanation-${q.id}`);
  if (expEl) {
    if (hasExplanation(q)) {
      expEl.innerHTML = renderExplanationHtml(q);
      expEl.classList.remove('hidden');
      expEl.classList.add('show');
    } else {
      expEl.innerHTML = '<div class="explanation-empty">本题暂无答案解析</div>';
      expEl.classList.remove('hidden');
      expEl.classList.add('show', 'no-content');
    }
  }
}

function showSummary() {
  const total = currentQuestions.length;
  const answered = Object.keys(checkedMap).length;
  let correct = 0;
  let wrong = 0;

  Object.values(checkedMap).forEach((v) => {
    if (v.correct) correct++;
    else wrong++;
  });

  const modal = document.getElementById('summary-modal');
  document.getElementById('summary-score').textContent =
    answered > 0 ? `${Math.round((correct / answered) * 100)}%` : '—';
  document.getElementById('summary-detail').textContent =
    `共 ${total} 题 · 已答 ${answered} · 正确 ${correct} · 错误 ${wrong} · 未答 ${total - answered}`;
  modal.classList.add('show');
}

function resetPractice() {
  checkedMap = {};
  document.getElementById('summary-modal').classList.remove('show');
  applyFilter();
}

/* ---------- 背题模式 ---------- */

function renderStudyCard() {
  document.getElementById('study-card-view').classList.remove('hidden');
  document.getElementById('study-list-view').classList.add('hidden');

  const cardEl = document.getElementById('study-card');
  const progressEl = document.getElementById('study-progress');

  if (studyQuestions.length === 0) {
    cardEl.innerHTML =
      '<div class="empty-state"><div class="icon">📖</div><p>没有符合条件的题目</p></div>';
    progressEl.textContent = '0 / 0';
    return;
  }

  if (studyIndex >= studyQuestions.length) studyIndex = studyQuestions.length - 1;
  if (studyIndex < 0) studyIndex = 0;

  const q = studyQuestions[studyIndex];
  progressEl.textContent = `${studyIndex + 1} / ${studyQuestions.length}`;

  cardEl.innerHTML = `
    <div class="question-card study-card">
      <div class="q-header">
        <span class="q-num">题号 ${q.id}</span>
        <span class="q-chapter">${escapeHtml(getChapterName(q.chapter))}</span>
        <span class="q-type ${q.type}">${TYPE_LABELS[q.type]}</span>
      </div>
      <div class="q-stem">${escapeHtml(q.stem)}</div>
      <div class="options">
        ${q.options
          .map(
            (opt) => `
          <div class="option study-option ${opt.correct ? 'correct-answer' : ''}">
            <span class="option-label">${opt.id}.</span>
            <span class="option-text">${escapeHtml(opt.text)}</span>
            ${opt.correct ? '<span class="answer-tag">✓ 正确答案</span>' : ''}
          </div>`
          )
          .join('')}
      </div>
      <div class="study-answer-summary">
        正确答案：${formatAnswer(q, getCorrectAnswer(q))}
      </div>
      ${hasExplanation(q) ? `<div class="explanation-box show">${renderExplanationHtml(q)}</div>` : ''}
    </div>`;
}

function renderStudyList() {
  document.getElementById('study-card-view').classList.add('hidden');
  document.getElementById('study-list-view').classList.remove('hidden');

  const listEl = document.getElementById('study-list-view');

  if (studyQuestions.length === 0) {
    listEl.innerHTML =
      '<div class="empty-state"><div class="icon">📖</div><p>没有符合条件的题目</p></div>';
    return;
  }

  listEl.innerHTML = studyQuestions
    .map(
      (q, idx) => `
    <div class="question-card study-card">
      <div class="q-header">
        <span class="q-num">${idx + 1}. 题号 ${q.id}</span>
        <span class="q-chapter">${escapeHtml(getChapterName(q.chapter))}</span>
        <span class="q-type ${q.type}">${TYPE_LABELS[q.type]}</span>
      </div>
      <div class="q-stem">${escapeHtml(q.stem)}</div>
      <div class="options">
        ${q.options
          .map(
            (opt) => `
          <div class="option study-option ${opt.correct ? 'correct-answer' : ''}">
            <span class="option-label">${opt.id}.</span>
            <span class="option-text">${escapeHtml(opt.text)}</span>
            ${opt.correct ? '<span class="answer-tag">✓</span>' : ''}
          </div>`
          )
          .join('')}
      </div>
      ${hasExplanation(q) ? `<div class="explanation-box show">${renderExplanationHtml(q)}</div>` : ''}
    </div>`
    )
    .join('');
}

function studyPrev() {
  if (studyIndex > 0) {
    studyIndex--;
    renderStudyCard();
  }
}

function studyNext() {
  if (studyIndex < studyQuestions.length - 1) {
    studyIndex++;
    renderStudyCard();
  }
}

/* ---------- 错题集 ---------- */

function renderWrongBook() {
  const book = getWrongBook();
  const ids = Object.keys(book).map(Number).sort((a, b) => a - b);
  const list = document.getElementById('wrong-list');

  if (ids.length === 0) {
    list.innerHTML =
      '<div class="empty-state"><div class="icon">🎉</div><p>暂无错题，继续保持！</p></div>';
    return;
  }

  list.innerHTML = ids
    .map((id) => {
      const q = allQuestions.find((x) => x.id === id);
      if (!q) return '';
      const entry = book[String(id)];
      const correctAns = getCorrectAnswer(q);
      const userAns = entry.lastUserAnswer || [];

      return `
      <div class="wrong-item" data-id="${id}">
        <div class="meta">
          <span>题号 ${id} · ${getChapterName(q.chapter)} · ${TYPE_LABELS[q.type]} · 错 ${entry.wrongCount} 次</span>
          <button class="btn btn-outline btn-sm" onclick="practiceOne(${id})">重做</button>
        </div>
        <div class="stem">${escapeHtml(q.stem)}</div>
        <div class="answer-info">
          <div class="your-ans">你的答案：${userAns.length ? formatAnswer(q, userAns) : '未作答'}</div>
          <div class="correct-ans">正确答案：${formatAnswer(q, correctAns)}</div>
        </div>
        ${hasExplanation(q) ? `<div class="explanation-box show">${renderExplanationHtml(q)}</div>` : ''}
      </div>`;
    })
    .join('');
}

function practiceOne(id) {
  switchTab('practice');
  document.getElementById('chapter-filter').value = 'all';
  document.getElementById('type-filter').value = 'all';
  document.getElementById('order-filter').value = 'id-asc';
  document.getElementById('count-filter').value = 'all';

  currentQuestions = allQuestions.filter((q) => q.id === id);
  checkedMap = {};
  renderQuestions();
  updateStats();
  document.getElementById(`card-${id}`)?.scrollIntoView({ behavior: 'smooth' });
}

function practiceWrongBook() {
  const book = getWrongBook();
  const ids = new Set(Object.keys(book).map(Number));
  if (ids.size === 0) {
    alert('错题集为空');
    return;
  }
  switchTab('practice');
  document.getElementById('chapter-filter').value = 'all';
  document.getElementById('type-filter').value = 'all';
  document.getElementById('order-filter').value = 'random';
  document.getElementById('count-filter').value = 'all';
  currentQuestions = shuffle(allQuestions.filter((q) => ids.has(q.id)));
  checkedMap = {};
  renderQuestions();
  updateStats();
}

function switchTab(tab) {
  mode = tab;
  document.querySelectorAll('.tab-btn').forEach((btn) => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  document.getElementById('practice-panel').classList.toggle('hidden', tab !== 'practice');
  document.getElementById('study-panel').classList.toggle('hidden', tab !== 'study');
  document.getElementById('wrongbook-panel').classList.toggle('hidden', tab !== 'wrongbook');

  if (tab === 'wrongbook') renderWrongBook();
  if (tab === 'study') applyStudyFilter();
}

function updateStats() {
  document.getElementById('stat-total').textContent = currentQuestions.length;
  const answered = Object.keys(checkedMap).length;
  let correct = 0;
  let wrong = 0;
  Object.values(checkedMap).forEach((v) => {
    if (v.correct) correct++;
    else wrong++;
  });
  document.getElementById('stat-answered').textContent = answered;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;
}

function arraysEqual(a, b) {
  if (a.length !== b.length) return false;
  return a.every((v, i) => v === b[i]);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function exportWrongBook() {
  const book = getWrongBook();
  const ids = Object.keys(book).map(Number);
  if (ids.length === 0) {
    alert('错题集为空');
    return;
  }

  let text = '人工智能训练师三级 - 错题集\n';
  text += `导出时间：${new Date().toLocaleString('zh-CN')}\n`;
  text += `共 ${ids.length} 道错题\n`;
  text += '='.repeat(40) + '\n\n';

  ids.sort((a, b) => a - b).forEach((id, i) => {
    const q = allQuestions.find((x) => x.id === id);
    if (!q) return;
    const entry = book[String(id)];
    text += `${i + 1}. [题号${id}] [${getChapterName(q.chapter)}] [${TYPE_LABELS[q.type]}] (错${entry.wrongCount}次)\n`;
    text += `题目：${q.stem}\n`;
    q.options.forEach((o) => {
      text += `  ${o.id}. ${o.text}${o.correct ? ' ← 正确' : ''}\n`;
    });
    const userAns = entry.lastUserAnswer || [];
    text += `你的答案：${userAns.length ? formatAnswer(q, userAns) : '未作答'}\n\n`;
  });

  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `错题集_${new Date().toISOString().slice(0, 10)}.txt`;
  a.click();
}

document.addEventListener('DOMContentLoaded', () => {
  init();

  document.querySelectorAll('.tab-btn').forEach((btn) => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  document.getElementById('chapter-filter').addEventListener('change', applyFilter);
  document.getElementById('type-filter').addEventListener('change', applyFilter);
  document.getElementById('order-filter').addEventListener('change', applyFilter);
  document.getElementById('count-filter').addEventListener('change', applyFilter);

  document.getElementById('study-chapter-filter').addEventListener('change', applyStudyFilter);
  document.getElementById('study-type-filter').addEventListener('change', applyStudyFilter);
  document.getElementById('study-view-mode').addEventListener('change', applyStudyFilter);
  document.getElementById('study-prev').addEventListener('click', studyPrev);
  document.getElementById('study-next').addEventListener('click', studyNext);

  document.getElementById('btn-summary').addEventListener('click', showSummary);
  document.getElementById('btn-reset').addEventListener('click', resetPractice);
  document.getElementById('btn-shuffle').addEventListener('click', () => {
    document.getElementById('order-filter').value = 'random';
    applyFilter();
  });

  document.getElementById('btn-close-modal').addEventListener('click', () => {
    document.getElementById('summary-modal').classList.remove('show');
  });
  document.getElementById('btn-reset-from-modal').addEventListener('click', resetPractice);

  document.getElementById('btn-practice-wrong').addEventListener('click', practiceWrongBook);
  document.getElementById('btn-export-wrong').addEventListener('click', exportWrongBook);
  document.getElementById('btn-clear-wrong').addEventListener('click', clearWrongBook);
});

window.practiceOne = practiceOne;

  </script>
