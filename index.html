<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>AI训练师三级练习</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#2563eb" />

  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --primary: #2563eb;
  --primary-hover: #1d4ed8;
  --success: #16a34a;
  --error: #dc2626;
  --warning: #d97706;
  --text: #1e293b;
  --muted: #64748b;
  --border: #e2e8f0;
  --shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
  --radius: 12px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
    "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

header {
  background: linear-gradient(135deg, #1e40af 0%, #2563eb 100%);
  color: white;
  padding: 1.5rem 1rem;
  text-align: center;
  box-shadow: 0 2px 12px rgba(37, 99, 235, 0.3);
}

header h1 {
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 0.25rem;
}

header p {
  font-size: 0.875rem;
  opacity: 0.9;
}

.container {
  max-width: 860px;
  margin: 0 auto;
  padding: 1.25rem;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1.25rem;
  background: var(--card);
  padding: 0.5rem;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.tab-btn {
  flex: 1;
  padding: 0.65rem 1rem;
  border: none;
  background: transparent;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--muted);
  transition: all 0.2s;
}

.tab-btn.active {
  background: var(--primary);
  color: white;
}

.tab-btn:hover:not(.active) {
  background: var(--bg);
}

/* Toolbar */
.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  align-items: center;
  margin-bottom: 1.25rem;
  padding: 1rem;
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.toolbar label {
  font-size: 0.85rem;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 0.35rem;
}

.toolbar select {
  padding: 0.4rem 0.6rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 0.85rem;
}

.stats {
  margin-left: auto;
  font-size: 0.85rem;
  color: var(--muted);
}

.stats strong {
  color: var(--primary);
}

.stats strong.stat-good {
  color: var(--success);
}

.stats strong.stat-bad {
  color: var(--error);
}

.hint-bar {
  background: #eff6ff;
  color: #1d4ed8;
  padding: 0.55rem 1rem;
  border-radius: 8px;
  font-size: 0.82rem;
  margin-bottom: 1rem;
  text-align: center;
}

.confirm-row {
  margin-top: 0.75rem;
}

.btn-confirm {
  padding: 0.45rem 1rem;
  font-size: 0.85rem;
}

.btn-sm {
  padding: 0.25rem 0.6rem;
  font-size: 0.75rem;
}

/* 背题模式 */
.study-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1.5rem;
  margin-bottom: 1rem;
}

#study-progress {
  font-weight: 600;
  color: var(--primary);
  min-width: 5rem;
  text-align: center;
}

.study-card {
  border-left-color: var(--warning);
}

.study-option {
  cursor: default;
}

.study-option.correct-answer {
  border-color: var(--success);
  background: #f0fdf4;
}

.answer-tag {
  font-size: 0.75rem;
  color: var(--success);
  font-weight: 600;
  white-space: nowrap;
  flex-shrink: 0;
}

.study-answer-summary {
  margin-top: 1rem;
  padding: 0.65rem 0.85rem;
  background: #f0fdf4;
  border-radius: 8px;
  color: var(--success);
  font-size: 0.9rem;
  font-weight: 500;
}

#study-list-view .question-card {
  margin-bottom: 1rem;
}

/* Buttons */
.btn {
  padding: 0.55rem 1.1rem;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.875rem;
  font-weight: 500;
  transition: all 0.2s;
}

.btn-primary {
  background: var(--primary);
  color: white;
}

.btn-primary:hover {
  background: var(--primary-hover);
}

.btn-success {
  background: var(--success);
  color: white;
}

.btn-success:hover {
  filter: brightness(1.05);
}

.btn-outline {
  background: white;
  color: var(--primary);
  border: 1px solid var(--primary);
}

.btn-outline:hover {
  background: #eff6ff;
}

.btn-danger {
  background: var(--error);
  color: white;
}

.btn-danger:hover {
  filter: brightness(1.05);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Question card */
.question-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 1.25rem 1.5rem;
  margin-bottom: 1rem;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--primary);
  transition: border-color 0.3s;
}

.question-card.correct {
  border-left-color: var(--success);
}

.question-card.wrong {
  border-left-color: var(--error);
}

.question-card.unchecked {
  border-left-color: var(--border);
}

.q-header {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.75rem;
  flex-wrap: wrap;
}

.q-chapter {
  font-size: 0.72rem;
  padding: 0.15rem 0.5rem;
  border-radius: 999px;
  background: #f1f5f9;
  color: var(--muted);
  font-weight: 500;
}

.q-num {
  font-weight: 700;
  color: var(--primary);
  font-size: 0.95rem;
}

.q-type {
  font-size: 0.75rem;
  padding: 0.15rem 0.5rem;
  border-radius: 999px;
  font-weight: 500;
}

.q-type.single {
  background: #dbeafe;
  color: #1d4ed8;
}

.q-type.multiple {
  background: #fef3c7;
  color: #b45309;
}

.q-type.judgment {
  background: #dcfce7;
  color: #15803d;
}

.q-stem {
  font-size: 1rem;
  margin-bottom: 1rem;
  line-height: 1.7;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.option {
  display: flex;
  align-items: flex-start;
  gap: 0.6rem;
  padding: 0.65rem 0.85rem;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  width: 100%;
}

.option:hover:not(.disabled) {
  border-color: var(--primary);
  background: #f8fafc;
}

.option:active:not(.disabled) {
  transform: scale(0.99);
  background: #eff6ff;
}

.option.selected {
  border-color: var(--primary);
  background: #eff6ff;
}

.option.correct-answer {
  border-color: var(--success);
  background: #f0fdf4;
}

.option.wrong-answer {
  border-color: var(--error);
  background: #fef2f2;
}

.option.disabled {
  cursor: default;
}

.option input {
  margin-top: 0.25rem;
  accent-color: var(--primary);
  flex-shrink: 0;
  width: 20px;
  height: 20px;
  cursor: pointer;
}

.option-label {
  font-weight: 600;
  color: var(--primary);
  min-width: 1.2rem;
  pointer-events: none;
}

.option-text {
  flex: 1;
  pointer-events: none;
}

.result-badge {
  display: none;
  margin-top: 0.75rem;
  padding: 0.5rem 0.85rem;
  border-radius: 8px;
  font-size: 0.875rem;
  font-weight: 500;
}

.result-badge.show {
  display: block;
}

.result-badge.correct {
  background: #f0fdf4;
  color: var(--success);
}

.result-badge.wrong {
  background: #fef2f2;
  color: var(--error);
}

.explanation-box {
  display: none;
  margin-top: 0.85rem;
  padding: 0.85rem 1rem;
  background: #fffbeb;
  border: 1px solid #fde68a;
  border-radius: 8px;
  font-size: 0.875rem;
  line-height: 1.75;
  color: #78350f;
}

.explanation-box.show {
  display: block;
}

.explanation-box.no-content {
  background: #f8fafc;
  border-color: var(--border);
  color: var(--muted);
}

.explanation-empty {
  font-size: 0.82rem;
  color: var(--muted);
  text-align: center;
}

.q-has-exp {
  font-size: 0.72rem;
  padding: 0.15rem 0.5rem;
  border-radius: 999px;
  background: #fffbeb;
  color: #b45309;
  font-weight: 500;
}

.explanation-title {
  font-weight: 700;
  color: #b45309;
  margin-bottom: 0.5rem;
  font-size: 0.9rem;
}

.explanation-text {
  white-space: pre-wrap;
  word-break: break-word;
}

.explanation-img {
  display: block;
  max-width: 100%;
  margin-top: 0.75rem;
  border-radius: 6px;
  border: 1px solid var(--border);
}

/* Action bar */
.action-bar {
  position: sticky;
  bottom: 0;
  background: var(--card);
  padding: 1rem;
  border-radius: var(--radius);
  box-shadow: 0 -4px 24px rgba(15, 23, 42, 0.1);
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 1rem;
}

/* Summary modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.5);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}

.modal-overlay.show {
  display: flex;
}

.modal {
  background: var(--card);
  border-radius: var(--radius);
  padding: 2rem;
  max-width: 420px;
  width: 100%;
  text-align: center;
  box-shadow: var(--shadow);
}

.modal h2 {
  margin-bottom: 1rem;
  font-size: 1.25rem;
}

.modal .score {
  font-size: 3rem;
  font-weight: 800;
  color: var(--primary);
  margin: 0.5rem 0;
}

.modal .detail {
  color: var(--muted);
  margin-bottom: 1.5rem;
}

.modal-actions {
  display: flex;
  gap: 0.75rem;
  justify-content: center;
}

/* Wrong book */
.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--muted);
}

.empty-state .icon {
  font-size: 3rem;
  margin-bottom: 1rem;
}

.wrong-item {
  background: var(--card);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  margin-bottom: 0.75rem;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--error);
}

.wrong-item .meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.5rem;
  font-size: 0.8rem;
  color: var(--muted);
}

.wrong-item .stem {
  font-size: 0.95rem;
  margin-bottom: 0.5rem;
}

.wrong-item .answer-info {
  font-size: 0.85rem;
}

.wrong-item .your-ans {
  color: var(--error);
}

.wrong-item .correct-ans {
  color: var(--success);
}

.wrong-count-badge {
  background: var(--error);
  color: white;
  font-size: 0.7rem;
  padding: 0.1rem 0.45rem;
  border-radius: 999px;
  margin-left: 0.35rem;
}

.hidden {
  display: none !important;
}

.loading {
  text-align: center;
  padding: 4rem;
  color: var(--muted);
}

@media (max-width: 600px) {
  body {
    padding-bottom: env(safe-area-inset-bottom);
  }

  header {
    padding-top: max(1.25rem, env(safe-area-inset-top));
  }

  header h1 {
    font-size: 1.15rem;
  }

  .container {
    padding: 0.75rem;
  }

  .tab-btn {
    font-size: 0.82rem;
    padding: 0.55rem 0.35rem;
  }

  .toolbar {
    flex-direction: column;
    align-items: stretch;
  }

  .toolbar label {
    width: 100%;
  }

  .toolbar select {
    flex: 1;
    width: 100%;
    min-height: 44px;
    font-size: 16px;
  }

  .btn {
    min-height: 44px;
  }

  .option {
    min-height: 52px;
    padding: 0.85rem;
  }

  .option input {
    width: 22px;
    height: 22px;
    margin-top: 0.15rem;
  }

  .stats {
    margin-left: 0;
    text-align: center;
  }

  .question-card {
    padding: 1rem;
  }

  .action-bar {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    margin: 0;
    border-radius: 0;
    padding-bottom: max(1rem, env(safe-area-inset-bottom));
    z-index: 50;
  }

  #practice-panel {
    padding-bottom: 5rem;
  }
}


body { padding-bottom: env(safe-area-inset-bottom); }
header { padding-top: max(1.5rem, env(safe-area-inset-top)); }
.container { padding: 0.75rem; padding-bottom: 2rem; }
.tab-btn { font-size: 0.82rem; padding: 0.55rem 0.4rem; }
.toolbar select, .toolbar label { width: 100%; }
.toolbar select { flex: 1; min-height: 44px; font-size: 16px; }
.btn { min-height: 44px; }
.option { min-height: 48px; padding: 0.75rem; }
.action-bar {
  position: fixed; left: 0; right: 0; bottom: 0; margin: 0;
  border-radius: 0; padding-bottom: max(1rem, env(safe-area-inset-bottom)); z-index: 50;
}
#practice-panel { padding-bottom: 5rem; }
.hint-bar { font-size: 0.78rem; }

  </style>
</head>
<body>
<header>
    <h1 id="page-title">人工智能训练师三级理论练习</h1>
    <p id="page-subtitle">加载中...</p>
  </header>

  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" data-tab="practice">练习模式</button>
      <button class="tab-btn" data-tab="study">背题模式</button>
      <button class="tab-btn" data-tab="wrongbook">
        错题集
        <span id="wrong-badge" class="wrong-count-badge hidden">0</span>
      </button>
    </div>

    <!-- 练习面板 -->
    <div id="practice-panel">
      <div class="toolbar">
        <label>
          章节
          <select id="chapter-filter"></select>
        </label>
        <label>
          题型
          <select id="type-filter">
            <option value="all">全部</option>
            <option value="single">单选</option>
            <option value="multiple">多选</option>
            <option value="judgment">判断</option>
          </select>
        </label>
        <label>
          顺序
          <select id="order-filter">
            <option value="id-asc">按题号</option>
            <option value="id-desc">题号倒序</option>
            <option value="random">随机</option>
          </select>
        </label>
        <label>
          数量
          <select id="count-filter">
            <option value="all">全部 180 题</option>
            <option value="90">模拟考试 90 题</option>
            <option value="30">快速练习 30 题</option>
            <option value="10">每日 10 题</option>
          </select>
        </label>
        <button class="btn btn-outline" id="btn-shuffle">重新随机</button>
        <div class="stats">
          当前 <strong id="stat-total">0</strong> 题 ·
          已答 <strong id="stat-answered">0</strong> 题 ·
          正确 <strong id="stat-correct" class="stat-good">0</strong> ·
          错误 <strong id="stat-wrong" class="stat-bad">0</strong>
        </div>
      </div>

      <div class="hint-bar">单选/判断：点选后立即显示答案；多选：选完后点「确认答案」</div>

      <div id="question-list">
        <div class="loading">正在加载题目...</div>
      </div>

      <div class="action-bar">
        <button class="btn btn-success" id="btn-summary">查看练习统计</button>
        <button class="btn btn-outline" id="btn-reset">重新开始</button>
      </div>
    </div>

    <!-- 背题面板 -->
    <div id="study-panel" class="hidden">
      <div class="toolbar">
        <label>
          章节
          <select id="study-chapter-filter"></select>
        </label>
        <label>
          题型
          <select id="study-type-filter">
            <option value="all">全部</option>
            <option value="single">单选</option>
            <option value="multiple">多选</option>
            <option value="judgment">判断</option>
          </select>
        </label>
        <label>
          浏览
          <select id="study-view-mode">
            <option value="card">逐题浏览</option>
            <option value="list">列表全览</option>
          </select>
        </label>
        <div class="stats">
          共 <strong id="study-stat-total">0</strong> 题
        </div>
      </div>

      <div id="study-card-view">
        <div class="study-nav">
          <button class="btn btn-outline" id="study-prev">上一题</button>
          <span id="study-progress">1 / 1</span>
          <button class="btn btn-outline" id="study-next">下一题</button>
        </div>
        <div id="study-card"></div>
      </div>

      <div id="study-list-view" class="hidden"></div>
    </div>

    <!-- 错题集面板 -->
    <div id="wrongbook-panel" class="hidden">
      <div class="toolbar">
        <button class="btn btn-primary" id="btn-practice-wrong">练习全部错题</button>
        <button class="btn btn-outline" id="btn-export-wrong">导出错题集</button>
        <button class="btn btn-danger" id="btn-clear-wrong">清空错题集</button>
      </div>
      <div id="wrong-list">
        <div class="empty-state">
          <div class="icon">📚</div>
          <p>暂无错题</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 成绩弹窗 -->
  <div class="modal-overlay" id="summary-modal">
    <div class="modal">
      <h2>练习统计</h2>
      <div class="score" id="summary-score">0%</div>
      <div class="detail" id="summary-detail"></div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="btn-close-modal">继续练习</button>
        <button class="btn btn-outline" id="btn-reset-from-modal">重新开始</button>
      </div>
    </div>

  <script>

为人的侵权行为与权利人的损失之间有因果关系", "correct": false}, {"id": "D", "text": "行为人有过错", "correct": false}]}, {"id": 11, "type": "single", "chapter": "ethics", "stem": "逆向思维法不包含的内容是（    ）。", "explanation": null, "options": [{"id": "A", "text": "功能反转", "correct": false}, {"id": "B", "text": "结构反转", "correct": false}, {"id": "C", "text": "状态反转", "correct": false}, {"id": "D", "text": "伦理反转", "correct": true}]}, {"id": 12, "type": "single", "chapter": "hardware", "stem": "Logisim中蓝色线缆代表什么值（）。", "explanation": {"text": "答案：A. x（不确定值）\nLogisim 线缆颜色电平规则\n黑色：逻辑 0（低电平，对应选项 D）\n绿色：逻辑 1（高电平，对应选项 C）\n蓝色：不定态、未知态，记作 x，也就是不确定值\n补充说明\n出现蓝色线路一般是线路悬空、信号冲突、未驱动导致电平无法确定，它本身既不是 0 也不是 1，属于未知逻辑状态。\n所以蓝色线缆代表不确定值 x。", "images": []}, "options": [{"id": "A", "text": "x（不确定值）", "correct": true}, {"id": "B", "text": "其他", "correct": false}, {"id": "C", "text": "1", "correct": false}, {"id": "D", "text": "0", "correct": false}]}, {"id": 13, "type": "single", "chapter": "hardware", "stem": "三角波和锯齿波发生电路一般有()环节。", "explanation": {"text": "方波经过积分电路可以生成三角波 / 锯齿波\n积分运算电路的输出公式：\nuo​=−RC1​∫ui​dt\n输入恒定高电平（方波高电平）时，积分电路输出电压会线性缓慢上升；\n输入恒定低电平（方波低电平）时，积分电路输出电压会线性缓慢下降；\n一升一降反复交替，就形成三角波。\n锯齿波原理类似\n只让积分电路单向持续线性充电（只上升或只快速回落），就能得到单向斜变的锯齿波。\n因此三角波、锯齿波发生器核心必备环节就是积分电路。", "images": []}, "options": [{"id": "A", "text": "状态", "correct": false}, {"id": "B", "text": "动作", "correct": false}, {"id": "C", "text": "积分", "correct": true}, {"id": "D", "text": "比赛", "correct": false}]}, {"id": 14, "type": "single", "chapter": "hardware", "stem": "八输入端的编码器按二进制数编码时，输出端的个数是（   ）。", "explanation": {"text": "", "images": ["data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAhMAAAF5CAIAAACqRj/SAAAAAXNSR0IArs4c6QAAAIRlWElmTU0AKgAAAAgABQESAAMAAAABAAEAAAEaAAUAAAABAAAASgEbAAUAAAABAAAAUgEoAAMAAAABAAIAAIdpAAQAAAABAAAAWgAAAAAAAABIAAAAAQAAAEgAAAABAAOgAQADAAAAAQABAACgAgAEAAAAAQAAAhOgAwAEAAAAAQAAAXkAAAAAzl/qbwAAAAlwSFlzAAALEwAACxMBAJqcGAAAQABJREFUeAHs3HWAHEXULvwvJLgEd3d3dwjunuAuwd3dgmtwhwQLBHd3d3d3d4fv91Lvrdu3Z3azszLAzJk/NtXVpU9VnedIdbr9/vvv/1/8AoFAIBAIBAKBNiMwVJtL ": "project", "stem": "确保项目产品的说明是正确和完整的是（ ）。", "explanation": {"text": "1. 配置管理核心作用\n配置管理的核心工作就是识别、记录、管控项目产品的规格说明、文档、成果版本，保证产品描述、需求说明、技术文档始终准确、完整、版本一致，防止文档与实际产品不一致、说明缺失错乱，正好对应题干 “确保项目产品的说明是正确和完整”。\n2. 其他选项辨析\nB. 综合变更控制：聚焦变更请求的审批、整体统筹变更落地，只管变更流程，不负责保证产品说明本身完整正确。\nC. 综合管理（项目整体管理）：是项目整体统筹大类，包含制定章程、编制项目计划、整体监控收尾，范围太宽泛，不是专门管控产品说明完整性的专项工作。\nD. 变更控制委员会（CCB）：是评审、审批变更申请的组织 / 小组，是决策机构，不是用来维护产品说明正确性的管理活动。\n精简总结\n管控产品文档、规格说明准确完整是配置管理的典型职能。", "images": []}, "options": [{"id": "A", "text": "配置管理", "correct": true}, {"id": "B", "text": "综合变更控制", "correct": false}, {"id": "C", "text": "综合管理", "correct": false}, {"id": "D", "text": "变更控制委员会", "correct": false}]}, {"id": 19, "type": "single", "chapter": "project", "stem": "全球IT外包服务的首要原因是（）。", "explanation": {"text": "一、核心原因辨析\n传统认知误区：很多人以为省钱（成本削减 A）是第一原因\n早期低端外包确实以压缩人力成本为出发点，但全球高端 IT 外包、离岸外包长期调研结论：人才缺口才是首要驱动因素。\n很多发达国家本土具备对应技术能力、特定稀缺技能（云计算、大数据、嵌入式、底层开发等）的工程师供给不足，企业在本地招不到足够合格人员，只能通过 IT 外包在全球范围内获取专业技术人力，这是全球 IT 外包持续扩张的首要动因。\nA. 成本削减\n属于重要次要动因，不是首要原因。部分企业外包确实可以降低薪资、办公运维开支，但如果本地人才充足，多数企业优先选择自建团队，不会单纯为省钱外包。\nC. 缩短面试时间\n只是外包附带的微小优势，绝非外包开展的根本原因。\nD. 增加收入\n外包更多是控制支出、补齐产能，不能直接等同于增加企业收入，逻辑不成立。", "images": []}, "options": [{"id": "A", "text": "成本削减", "correct": false}, {"id": "B", "text": "合格人才短缺", "correct": true}, {"id": "C", "text": "缩短面试时间", "correct": false}, {"id": "D", "text": "增加收入", "correct": false}]}, {"id": 20, "type": "single", "chapter": "project", "stem": "原型法可以分为模型式原型、()和演进式原型三种。", "explanation": null, "options": [{"id": "A", "text": "模型式原型", "correct": false}, {"id": "B", "text": "渐进式原型", "correct": true}, {"id": "C", "text": "演进式原型", "correct": false}, {"id": "D", "text": "突进型", "correct": false}]}, {"id": 21, "type": "single", "chapter": "project", "stem": "系统分析主要解决信息系统“（）”的问题，具体怎么做的问题是系统设计阶段的任务。", "explanation": null, "options": [{"id": "A", "text": "时间", "correct": false}, {"id": "B", "text": "做什么", "correct": true}, {"id": "C", "text": "状态", "correct": false}, {"id": "D", "text": "日期", "correct": false}]}, {"id": 22, "type": "single", "chapter": "general", "stem": "衡量系统开发质量的首要标准是(      )。", "explanation": {"text": "核心逻辑系统开发的最终目的是交付能解决用户业务问题、匹配用户实际需求的软件产品。无论技术多先进、代码多么符合规范，如果不能匹配用户真实使用诉求，这个系统就是不合格的。因此满足用户需求是衡量系统开发质量的首要标准。\n其余选项辨析\nA. 技术规范：属于开发过程约束，是保障质量的手段，不是判断整体质量的首要标准。\nC. 满足技术指标：只是技术层面的硬性参数达标，若指标偏离用户业务需求，系统依然不算高质量。\nD. 满足设计者要求：开发人员的设计思路必须服务于用户，不能以设计者自身想法作为质量评判依据。", "images": []}, "options": [{"id": "A", "text": "技术规范", "correct": false}, {"id": "B", "text": "满足用户要求", "correct": true}, {"id": "C", "text": "满足技术指标", "correct": false}, {"id": "D", "text": "满足设计者要求", "correct": false}]}, {"id": 23, "type": "single", "chapter": "python", "stem": "执行“print(0o20)”，则在屏幕上会输出（    ）。", "explanation": {"text": "原理说明\n在 Python 中：\n0o 开头代表八进制数值\n0o20 是八进制的 20，转换成十进制计算：\n2×81+0×80=16+0=16\n执行 print(0o20) 会直接输出该数字对应的十进制结果 16。", "images": []}, "options": [{"id": "A", "text": "32", "correct": false}, {"id": "B", "text": "0o20", "correct": false}, {"id": "C", "text": "20", "correct": false}, {"id": "D", "text": "16", "correct": true}]}, {"id": 24, "type": "single", "chapter": "python", "stem": "类方法的第一个形参对应（    ）。", "explanation": {"text": "类方法定义格式\n类方法使用装饰器 @classmethod 修饰，它第一个形参约定为 cls，这个参数代表当前类本身。\n示例：\npython\n运行\nclass Test:\n    @classmethod\n    def func(cls):\n        print(cls) # cls 就是 Test 这个类\n区分实例方法（避免混淆）\n普通实例方法第一个参数是 self，代表实例对象（对应选项 C）。\n其他选项错误原因\nB. 第二个实参：形参是自动接收类，和外部传入实参顺序无关\nC. 对象：是实例方法 self 的含义，不是类方法\nD. 第一个实参：cls 由 Python 自动传入，不是用户手动传的第一个实参\n总结：类方法首参数代表类，实例方法首参数代表对象。", "images": []}, "options": [{"id": "A", "text": "类", "correct": true}, {"id": "B", "text": "第二个实参", "correct": false}, {"id": "C", "text": "对象", "correct": false}, {"id": "D", "text": "第一个实参", "correct": false}]}, {"id": 25, "type": "single", "chapter": "image", "stem": "什么滤波器在对图像复原过程中需要计算噪声功率谱和图像功率谱(  )。", "explanation": {"text": "维纳滤波（最小均方误差滤波）\n维纳滤波的复原公式推导中，必须用到原始图像功率谱与噪声功率谱的比值，以此构造最优滤波函数，在抑制噪声与消除模糊之间取得平衡，是题目描述的滤波器。\n各选项区分\nA. 逆滤波\n逆滤波仅用退化函数直接求逆复原图像，不需要功率谱；缺点是会放大噪声。\nC. 带通滤波\n属于频域基础滤波，作用是保留特定频段、过滤高低频，多用于图像增强，不用于图像复原，也不需要两类功率谱计算。\nD. 陷波滤波\n用来去除图像中周期性干扰噪声，同样不属于图像复原主流算法，无需图像、噪声功率谱。", "images": []}, "options": [{"id": "A", "text": "逆滤波", "correct": false}, {"id": "B", "text": "维纳滤波", "correct": true}, {"id": "C", "text": "带通滤波", "correct": false}, {"id": "D", "text": "陷波滤波", "correct": false}]}, {"id": 26, "type": "single", "chapter": "image", "stem": "下列因素中与客观保真度有关的是(  )。", "explanation": {"text": "概念区分\n客观保真度\n用可定量计算的数学指标衡量图像压缩前后差异，不靠人眼主观判断，典型指标：\n均方误差 MSE\n均方根误差 RMSE\n信噪比 SNR、峰值信噪比 PSNR\n主观保真度\n依靠人眼观察、主观打分评价画面视觉好坏，对应选项 C。\n逐个选项解析\nA. 输入图与输出图之间的误差\n表述笼统，单个像素差值不能整体衡量整体保真程度，不是规范的客观保真度指标。\nB. 输入图与输出图之间的均方根误差（RMSE）\n标准化客观量化指标，专门用来定量衡量两幅图像整体偏差，属于典型客观保真度，为正确答案。\nC. 压缩图与解压缩图的视觉质量\n是人眼观感判断，属于主观保真度。\nD. 压缩图与解压缩图的信噪比\n信噪比虽是客观指标，但定义是压缩前后图像差值信号与原图像信号比值；\n客观保真度核心基准度量是均方根误差，本题标准答案设定为 B。\n补充记忆：\n✅ 客观保真度 = 数学数值计算（RMSE、MSE）\n✅ 主观保真度 = 人眼视觉评价", "images": []}, "options": [{"id": "A", "text": "输入图与输出图之间的误差", "correct": false}, {"id": "B", "text": "输入图与输出图之间的均方根误差", "correct": true}, {"id": "C", "text": "压缩图与解压缩图的视觉质量", "correct": false}, {"id": "D", "text": "压缩图与解压缩图的信噪比", "correct": false}]}, {"id": 27, "type": "single", "chapter": "image", "stem": "下列关于灰度直方图和图像面积叙述正确的是(  )。", "explanation": null, "options": [{"id": "A", "text": "图像面积越大，灰度直方图的X轴越长", "correct": false}, {"id": "B", "text": "灰度直方图按横轴积分得到的值就是图像的面积", "correct": true}, {"id": "C", "text": "图像的面积与图像的灰度直方图没有关系", "correct": false}, {"id": "D", "text": "图像面积越大，灰度直方图的Y轴越长", "correct": false}]}, {"id": 28, "type": "single", "chapter": "ml_ai", "stem": "“二手车价格预测”场景属于（ ）机器学习的典型任务。", "explanation": {"text": "概念解析\n回归任务：预测连续型数值\n二手车价格是一个连续可变的数字（几万、十几万、几十万），模型根据车况、里程、车龄等特征预测具体价格，属于典型回归问题。\n其他选项区分\nA. 聚类：无监督算法，自动把相似样本分组，没有预测目标值，和价格预测无关。\nC. 关联：挖掘事物之间关联规则（比如购物篮分析），不属于预测类任务。\nD. 分类：预测离散类别（例如判断二手车 “好 / 一般 / 差” 三档等级），不是预测具体金额。\n速记\n预测具体数字 → 回归\n预测类别标签 → 分类", "images": []}, "options": [{"id": "A", "text": "聚类", "correct": false}, {"id": "B", "text": "回归", "correct": true}, {"id": "C", "text": "关联", "correct": false}, {"id": "D", "text": "分类", "correct": false}]}, {"id": 29, "type": "single", "chapter": "bigdata", "stem": "以下(  )不是Hadoop的缺点。", "explanation": null, "options": [{"id": "A", "text": "磁盘I/O开销大", "correct": false}, {"id": "B", "text": "计算表达能力有限", "correct": false}, {"id": "C", "text": "数据文件被分布存储到多台机器上", "correct": true}, {"id": "D", "text": "计算延迟高", "correct": false}]}, {"id": 30, "type": "single", "chapter": "bigdata", "stem": "判断HDFS是否启动成功，可以通过（ ）命令。", "explanation": {"text": "jps 作用\njps 是 JDK 自带的 Java 进程查看命令。HDFS 由 NameNode、DataNode、SecondaryNameNode 等 Java 进程组成，执行jps后：\n能看到 NameNode、DataNode 进程 → HDFS 启动成功\n缺少对应进程 → HDFS 未正常启动\n这是检查 HDFS 运行状态最常用方式。\n其他选项辨析\nA. hdfs：只是 HDFS 命令前缀，单独输入hdfs只会打印命令帮助，不能判断服务是否启动。\nB. spark：是 Spark 计算框架相关命令，和 HDFS 状态检查无关。\nD. start-dfs：是启动 HDFS 的脚本命令（start-dfs.sh），用来开启服务，不是检查是否启动的命令。", "images": []}, "options": [{"id": "A", "text": "hdfs", "correct": false}, {"id": "B", "text": "spark", "correct": false}, {"id": "C", "text": "jps", "correct": true}, {"id": "D", "text": "start-dfs", "correct": false}]}, {"id": 31, "type": "single", "chapter": "search_knowledge", "stem": "在搜索过程中，当扩展节点时，以下说法错误的是：( )。", "explanation": {"text": "逐选项解析\nA（错误选项，本题答案）\n扩展节点的核心逻辑：一个节点可以匹配多个操作算符，每个算符都能生成对应子节点，并不是只能有一个算符。\n例如八数码问题，空格节点可以上、下、左、右移动，对应4 个算符，能生成多个子节点，因此 “一个节点的算符只有一个” 表述错误。\nB 正确\n常规搜索场景里，单个算符作用于当前节点，一般只会产生一个子节点。\nC 正确\n节点扩展的定义就是：取出待扩展节点，应用全部可用算符，生成该节点全部后继子节点。\nD 正确\n扩展生成子节点后，需要做回环检测：如果子节点是当前节点的父辈节点（父、祖父等），说明出现路径回头重复，需要剔除该子节点，避免搜索死循环。", "images": []}, "options": [{"id": "A", "text": "通常适用于一个节点的算符只有一个。", "correct": true}, {"id": "B", "text": "一个节点经一个算符操作通常只生成一个子节点。", "correct": false}, {"id": "C", "text": "扩展节点时，会生成该节点的所有后继节点。", "correct": false}, {"id": "D", "text": "判断子节点是否是当前扩展节点的父节点、祖父节点等，若是，则删除。", "correct": false}]}, {"id": 32, "type": "single", "chapter": "search_knowledge", "stem": "纳什均衡是指以下（ ）情况。", "explanation": {"text": "原理：囚徒博弈（纳什均衡经典模型）\n两个囚徒单独审讯，策略选择：合作（抵赖）、背叛（招供）\n收益逻辑：\n两人都合作（抵赖）：整体刑期最短\n一方合作、一方背叛：背叛者无罪释放，合作者重判\n两人都背叛（都招供）：各自中等刑期\n纳什均衡定义\n任何一方单独改变自身策略都无法获得更优收益，谁单方面反悔都吃亏。\n都背叛局面下：任意一人改成合作，自己刑期会变更长，因此双方都没有动机主动改变选择，构成纳什均衡。\n其余选项说明\nB、D（一合作一背叛）：背叛方有优势，但合作方一定会想改变策略去背叛，不稳定，不是均衡\nC（都合作）：整体最优解（帕累托最优），但每个人都有偷偷背叛获利的动机，容易被打破，不属于纳什均衡", "images": []}, "options": [{"id": "A", "text": "背叛，背叛", "correct": true}, {"id": "B", "text": "合作，背叛", "correct": false}, {"id": "C", "text": "合作，合作", "correct": false}, {"id": "D", "text": "背叛，合作", "correct": false}]}, {"id": 33, "type": "single", "chapter": "search_knowledge", "stem": "以下说法错误的是( )。", "explanation": {"text": "知识点：D-S 证据理论（信任函数、基本概率分配 m 函数）\n核心定义\n基本概率分配函数 m（概率分配函数）满足两条性质：\nm(∅)=0 （空集的概率分配一定为 0）\n全集（样本空间Ω）所有子集的 m 值之和：∑A⊆Ω​m(A)=1\n并不是 m(Ω)=1\n信任函数 Bel(A)=∑B⊆A​m(B)\nBel(Ω)=∑B⊆Ω​m(B)=1\nBel(∅)=m(∅)=0\n逐项分析\nA. 样本空间的信任函数为 1 ✅ 正确\nBel(Ω)=1，符合信任函数定义。\nB. 样本空间的概率分配函数为 1 ❌ 错误（本题答案）\n只有所有子集的 m 总和等于 1，样本空间本身的 m(Ω) 可以是 0~1 之间任意数值，不一定等于 1。\nC. 空集的信任函数为 0 ✅ 正确\nBel(∅)=m(∅)=0。\nD. 空集的概率分配函数为 0 ✅ 正确\nD-S 理论硬性规定 m(∅)≡0。", "images": []}, "options": [{"id": "A", "text": "样本空间的信任函数为1", "correct": false}, {"id": "B", "text": "样本空间的概率分配函数为1", "correct": true}, {"id": "C", "text": "空集的信任函数为0", "correct": false}, {"id": "D", "text": "空集的概率分配函数为0", "correct": false}]}, {"id": 34, "type": "single", "chapter": "ml_ai", "stem": "人工智能发展有很长的历史,其中，深度学习模型于(）提出。", "explanation": null, "options": [{"id": "A", "text": "1946年", "correct": false}, {"id": "B", "text": "1956年", "correct": false}, {"id": "C", "text": "1986年", "correct": false}, {"id": "D", "text": "2006年", "correct": true}]}, {"id": 35, "type": "single", "chapter": "image", "stem": "常应用于统计直方图中的信息的是（  ）。", "explanation": {"text": "函数作用解析\ncalcHist()\nOpenCV 专用函数，功能就是计算图像直方图统计，统计每个灰度级像素数量，完全匹配题干 “统计直方图信息”，是正确选项。\nB. cvtColor()\n用于颜色空间转换（例如彩色图转灰度图、RGB 转 HSV），和直方图计算无关。\nC. blur()\n图像均值模糊滤波函数，作用是平滑降噪，不做直方图统计。\nD. remap()\n图像重映射函数，用来对像素坐标进行几何变换（翻转、扭曲、移位），与直方图无关。", "images": []}, "options": [{"id": "A", "text": "calcHist()", "correct": true}, {"id": "B", "text": "cvtColor()", "correct": false}, {"id": "C", "text": "blur()", "correct": false}, {"id": "D", "text": "remap()", "correct": false}]}, {"id": 36, "type": "single", "chapter": "python", "stem": "在pycharm使用anaconda需要（  ）。", "explanation": null, "options": [{"id": "A", "text": "初始化虚拟环境", "correct": false}, {"id": "B", "text": "创建虚拟环境", "correct": true}, {"id": "C", "text": "进入虚拟环境", "correct": false}, {"id": "D", "text": "退出虚拟环境", "correct": false}]}, {"id": 37, "type": "single", "chapter": "general", "stem": "借助（  ）软件可以将图片形式的文字转化成文本。", "explanation": null, "options": [{"id": "A", "text": "文字识别", "correct": true}, {"id": "B", "text": "车牌识别", "correct": false}, {"id": "C", "text": "银行卡识别", "correct": false}, {"id": "D", "text": "名片识别", "correct": false}]}, {"id": 38, "type": "single", "chapter": "nlp", "stem": "给定⼀个句⼦，预测其分解⽣成的语法树的是（  ）。", "explanation": null, "options": [{"id": "A", "text": "分类", "correct": false}, {"id": "B", "text": "回归", "correct": false}, {"id": "C", "text": "语法树预测", "correct": true}, {"id": "D", "text": "⽬标检测", "correct": false}]}, {"id": 39, "type": "single", "chapter": "ml_ai", "stem": "对于训练完成的神经⽹络,（   ）⽤于客观的评价神经⽹络的性能。", "explanation": {"text": "答案详解\n数据集分工详解\n训练集（A）\n用来拟合、更新神经网络权重参数，模型在这组数据里反复学习，不能用来客观评价最终性能，模型会对训练数据产生过拟合。\n验证集（C）\n训练过程中使用，用来调超参数、选择模型结构、提前终止训练，属于训练环节的中间参考数据，不是最终客观评测用。\n测试集（B）\n全程不参与权重更新、参数调优，训练完全结束后单独使用，用来公正、客观衡量模型泛化能力与整体性能，符合题干描述。\n检验集（D）\n不属于机器学习标准数据集划分概念，为干扰选项。\n总结\n训练：训练集\n调参：验证集\n最终客观评估模型：测试集", "images": []}, "options": [{"id": "A", "text": "训练集", "correct": false}, {"id": "B", "text": "测试集", "correct": true}, {"id": "C", "text": "验证集", "correct": false}, {"id": "D", "text": "检验集", "correct": false}]}, {"id": 40, "type": "single", "chapter": "ml_ai", "stem": "EM算法，称为（  ），它⽤于求解MLE的⼀种迭代算法。", "explanation": {"text": "EM 是 Expectation-Maximization 的缩写：\nE 步（Expectation 期望步）：根据当前参数，计算隐变量的后验期望；\nM 步（Maximization 最大化步）：最大化似然函数，更新模型参数。\n整体全称就是期望–最大化算法，是求解含隐变量极大似然估计（MLE）的经典迭代算法。\nA 只说了 E 步、C 只说了 M 步，都不完整；\nD 最小化和 EM 算法核心逻辑无关。", "images": []}, "options": [{"id": "A", "text": "期望", "correct": false}, {"id": "B", "text": "期望-最⼤化", "correct": true}, {"id": "C", "text": "最大化", "correct": false}, {"id": "D", "text": "最小化", "correct": false}]}, {"id": 41, "type": "multiple", "chapter": "computer", "stem": "以下（ ）显示在Word窗口的状态栏中.", "explanation": {"text": "逐项解析\nA. 文档名：显示在标题栏，不在状态栏\nB. 当前页与总页数 ✅ 状态栏常规内容\nC. 光标插入位置（行号、列号等） ✅ 状态栏可开启显示\nD. 当前页的页眉：页眉是页面内容，不会显示在状态栏\nE. 放大缩小按钮（显示比例滑块） ✅ 在状态栏最右侧\n小结\nWord 状态栏包含：页码、页数、插入点位置、字数、视图切换按钮、显示比例缩放控件等。", "images": []}, "options": [{"id": "A", "text": "文档名", "correct": false}, {"id": "B", "text": "当前页与总页数", "correct": true}, {"id": "C", "text": "光标插入位置", "correct": true}, {"id": "D", "text": "当前页的页眉", "correct": false}, {"id": "E", "text": "放大缩小按钮", "correct": true}]}, {"id": 42, "type": "multiple", "chapter": "hardware", "stem": "单周期CPU设计实验中控制器单元不是什么（）。", "explanation": {"text": "题目理解\n题干：单周期 CPU 控制器单元不是什么（选出不属于控制器电路类型的选项）\n单周期 CPU 控制器本质：组合逻辑电路（B 是它本身，不能选）\n逐项分析\nA. 混合时序电路\n控制器只是纯组合逻辑，不含时序存储元件，不是混合时序电路 → 当选\nB. 组合逻辑电路\n单周期 CPU 控制器就是典型组合逻辑电路，是它本身，不选\nC. 异步时序逻辑电路\n无触发器、无异步时序结构，不是异步时序电路 → 当选\nD. 同步时序逻辑电路\n没有寄存器、状态寄存器，不存在时序状态跳转，不是同步时序电路 → 当选\nE. 没有\n错误，A、C、D 都符合 “不是控制器”\n✅ 正确多选答案：ACD\n补充原理\n单周期 CPU：一条指令一个时钟周期完成，控制器依据指令操作码直接译码产生控制信号，全程无状态、无存储元件，属于纯组合逻辑，不属于任何一类时序电路（同步、异步、混合时序都不是）。", "images": []}, "options": [{"id": "A", "text": "混合时序电路", "correct": true}, {"id": "B", "text": "组合逻辑电路", "correct": false}, {"id": "C", "text": "异步时序逻辑电路", "correct": true}, {"id": "D", "text": "同步时序逻辑电路", "correct": true}, {"id": "E", "text": "没有", "correct": false}]}, {"id": 43, "type": "multiple", "chapter": "project", "stem": "项目资源计划工具包括（）。", "explanation": {"text": "概念区分：工具 vs 输出成果\nA 资源矩阵 ✅ 资源计划工具\n用来直观匹配任务与所需资源，是资源分配规划工具。\nB 甘特图 ✅ 资源计划工具\n可结合进度安排调配资源投入时段，常用于资源统筹规划。\nC 资源需求清单 ❌ 不属于工具\n它是编制资源计划之后生成的输出文档，记录总共需要哪些资源、数量多少，是计划产物，不是编制计划的手段 / 工具。\nD 资源负荷图 ✅ 资源计划工具\n用于查看各时间段资源占用饱和度，用来优化、均衡资源配置，典型资源管理工具。\nE 都包括 ❌ 错误\n因为 C 不属于资源计划工具。\n总结\n项目资源计划工具：ABD\n资源需求清单是资源计划的输出结果，并非编制工具。", "images": []}, "options": [{"id": "A", "text": "资源矩阵", "correct": true}, {"id": "B", "text": "甘特图", "correct": true}, {"id": "C", "text": "资源需求清单", "correct": false}, {"id": "D", "text": "资源负荷图", "correct": true}, {"id": "E", "text": "都包括", "correct": false}]}, {"id": 44, "type": "multiple", "chapter": "nlp", "stem": "以下方面属于数字图像处理的应用有：(  )。", "explanation": null, "options": [{"id": "A", "text": "无人船", "correct": true}, {"id": "B", "text": "人脸识别", "correct": true}, {"id": "C", "text": "视频监控", "correct": true}, {"id": "D", "text": "智能机器人", "correct": true}, {"id": "E", "text": "语音识别", "correct": false}]}, {"id": 45, "type": "multiple", "chapter": "bigdata", "stem": "下面的论述中，正确的是：（    ）。", "explanation": {"text": "逐项解析\nA ✅ 正确\n传统机器学习算法大多单机运行，受内存、算力限制，仅适合小样本数据集训练。\nB ✅ 正确\nMapReduce 可以分布式处理全量海量数据，减小抽样带来的统计随机性偏差，模型训练样本更完整，精度有所提升。\nC ❌ 错误\nMapReduce 每次迭代都要读写磁盘，多轮迭代开销极大，不擅长迭代计算（梯度下降类机器学习迭代场景劣势明显）。\nD ❌ 错误\nSpark 基于内存计算，中间结果常驻内存，天然适合迭代计算，性能远优于 MapReduce。\nE ❌ 错误\nSpark MLlib 概念区分：\n转换器（Transformer）：只有 transform() 方法，无 fit()，直接转换 DataFrame；\n评估器（Estimator）：才有 fit() 方法，训练生成模型后再执行转换。\n描述颠倒错误。", "images": []}, "options": [{"id": "A", "text": "传统的机器学习算法，由于技术和单机存储的限制，大多只能在少量数据上使用", "correct": true}, {"id": "B", "text": "利用MapReduce框架在全量数据上进行机器学习，这在一定程度上解决了统计随机性的问题，提高了机器学习的精度", "correct": true}, {"id": "C", "text": "MapReduce可以高效支持迭代计算", "correct": false}, {"id": "D", "text": "Spark无法高效支持迭代计算", "correct": false}, {"id": "E", "text": "技术上，转换器实现了一个方法fit()，它通过附加一个或多个列，将一个DataFrame转换为另一个DataFrame", "correct": false}]}, {"id": 46, "type": "multiple", "chapter": "ml_ai", "stem": "逻辑回归的优点包括（  ）。", "explanation": null, "options": [{"id": "A", "text": "形式简单", "correct": true}, {"id": "B", "text": "模型效果好", "correct": true}, {"id": "C", "text": "训练速度较快", "correct": true}, {"id": "D", "text": "资源占用小", "correct": true}, {"id": "E", "text": "⽅便输出结果调整", "correct": true}]}, {"id": 47, "type": "multiple", "chapter": "datastructure", "stem": "数组M可存放10个元素，每个元素占4个字节，从首地址x开始按顺序连续存放，那么，元素M[8]的起始地址错误的有（）。", "explanation": {"text": "先计算正确地址\n数组默认下标从 0 开始：\nM[0] 起始地址：x\n单个元素占 4 字节\nM[8] 偏移量 = 8×4=32\nM[8] 正确起始地址：x+32（对应选项 D 是正确值）\n题目要求：选出错误的地址\nA. x+8 → 错误\nB. x+28 → 错误\nC. x+64 → 错误\nD. x+32 → 正确，不选\nE. 都不对 → 错误\n✅ 本题多选答案：ABC", "images": []}, "options": [{"id": "A", "text": "x+8", "correct": true}, {"id": "B", "text": "x+28", "correct": true}, {"id": "C", "text": "x+64", "correct": true}, {"id": "D", "text": "x+32", "correct": false}, {"id": "E", "text": "都不对", "correct": false}]}, {"id": 48, "type": "multiple", "chapter": "datastructure", "stem": "在多个应用中读取共享存储数据时，需要用到的query方法，不是（ ）对象的方法?", "explanation": {"text": "先理清核心知识点\nAndroid 跨应用共享数据：\nContentResolver（C 选项） 拥有 query() 方法：resolver.query(uri, ...)，用来访问 ContentProvider 数据。\nContentProvider 是数据提供方，它的 query 是被系统回调的内部方法，外部不会直接调用 ContentProvider 的 query。\n逐个分析：\n题目问：query() 不是哪个对象的方法（多选）\nA. ContentProvider\n外部代码不会调用它的 query，它的 query 是回调接口，query 不是外部使用该功能的方法所属对象 → 当选\nB. Cursor\nCursor 是查询结果游标，没有 query 方法 → 当选\nC. ContentResolver\n正是它提供 query () 执行查询，不选\nD. SQLiteHelper\n仅用来创建、打开数据库，无 query 方法 → 当选\nE. 都不是\n明显错误\n✅ 答案：ABD", "images": []}, "options": [{"id": "A", "text": "ContentProvider", "correct": true}, {"id": "B", "text": "Cursor", "correct": true}, {"id": "C", "text": "ContentResolver", "correct": false}, {"id": "D", "text": "SQLiteHelper", "correct": true}, {"id": "E", "text": "都不是", "correct": false}]}, {"id": 49, "type": "multiple", "chapter": "ethics", "stem": "APP内文字的大小设置与（ ）密切相关。", "explanation": {"text": "逐项分析\nA. 所使用颜色\n颜色只影响文字视觉观感，和字号大小设置无关，排除。\nB. 所在页面\n不同页面（首页标题、详情正文、弹窗提示等）通常会设定不同字号，相关，当选。\nC. 所表述内容\n标题、副标题、正文、提示小字、注释文字内容类型不同，字号必然区分设置，相关，当选。\nD. 所在层次\nUI 层级优先级越高文字字号往往越大，用来区分信息层级，相关，当选。\nE. 内存大小\n设备内存不影响 APP 文字尺寸设置逻辑，排除。", "images": []}, "options": [{"id": "A", "text": "所使用颜色", "correct": false}, {"id": "B", "text": "所在页面", "correct": true}, {"id": "C", "text": "所表述内容", "correct": true}, {"id": "D", "text": "所在层次", "correct": true}, {"id": "E", "text": "内存大小", "correct": false}]}, {"id": 50, "type": "multiple", "chapter": "ethics", "stem": "教学方法论由教学方法（ ）四个层面组成。", "explanation": null, "options": [{"id": "A", "text": "指导思想", "correct": true}, {"id": "B", "text": "基本方法", "correct": true}, {"id": "C", "text": "具体方法", "correct": true}, {"id": "D", "text": "教学方式", "correct": true}, {"id": "E", "text": "教学结论", "correct": false}]}, {"id": 51, "type": "judgment", "chapter": "ethics", "stem": "人工智能训练师是使用智能训练软件，在人工智能产品实际使用过程中进行数据库管理、算法参数设置、人机交互设计、性能测试跟踪及其他辅助作业的人员（ ）。", "explanation": null, "options": [{"id": "T", "text": "对", "correct": true}, {"id": "F", "text": "错", "correct": false}]}, {"id": 52, "type": "judgment", "chapter": "network", "stem": "TCP/IP协议实际上是一组协议，是一个完整的体系结构。〔   〕", "explanation": {"text": "OSI 七层模型是严谨完整、分层定义清晰的体系结构；\nTCP/IP 是协议簇（一组协议集合），它是在实践中形成的协议栈，分层划分相对粗略，并不是严格意义上设计完备、定义完整的体系结构，因此题干表述错误。", "images": []}, "options": [{"id": "T", "text": "对", "correct": false}, {"id": "F", "text": "错", "correct": true}]}, {"id": 53, "type": "judgment", "chapter": "law", "stem": "劳动关系不限于自然人的与用人单位之间，还可以是单位之间、自然人之间，并且可能是两个主体以上（ ）。", "explanation": {"text": "劳动关系具备法定主体限定：一方必须是用人单位（企业、个体经济组织等），另一方必须是自然人劳动者。\n单位与单位之间、自然人与自然人之间形成的是民事劳务、合作等民事关系，不属于劳动关系；\n劳动关系一般为两方主体，不存在三方及以上主体构成劳动关系的情形；\n因此题干表述错误。", "images": []}, "options": [{"id": "T", "text": "对", "correct": false}, {"id": "F", "text": "错", "correct": true}]}, {"id": 54, "type": "judgment", "chapter": "hardware", "stem": "循环冗余校验码不具有纠错功能。", "explanation": {"text": "CRC（循环冗余校验码）基础作用是检错，但在特定条件下具备有限纠错能力：\n若传输中只出现单个比特错误，通过余数匹配、定位出错位，CRC 可以算出错误位置并完成纠错；\n对于多位随机错误，CRC 通常只能检测出错、无法定位纠错；\n题目说 “不具有纠错功能” 过于绝对，因此该判断错误。", "images": []}, "options": [{"id": "T", "text": "对", "correct": false}, {"id": "F", "text": "错", "correct": true}]}, {"id": 55, "type": "judgment", "chapter": "hardware", "stem": "立即数可以直接送段寄存器。", "explanation": {"text": "8086 汇编语法规则：不允许将立即数直接赋值给段寄存器（CS、DS、ES、SS）。\n错误写法示例：\nasm\nMOV DS, 1000H\n如需给段寄存器赋值，必须借助通用寄存器中转，正确写法：\nasm\nMOV AX, 1000H\nMOV DS, AX\n因此题干说法错误。", "images": []}, "options": [{"id": "T", "text": "对", "correct": false}, {"id": "F", "text": "错", "correct": true}]}, {"id": 56, "type": "judgment", "chapter": "ethics", "stem": "执行力的定义是实现目标任务的实际程度。", "explanation": {"text": "执行力本质就是把战略、计划、目标落地落实，衡量能否完成既定目标、完成的实际达成程度，题干定义符合执行力的核心内涵，判断正确。", "images": []}, "options": [{"id": "T", "text": "对", "correct": true}, {"id": "F", "text": "错", "correct": false}]}, {"id": 57, "type": "judgment", "chapter": "project", "stem": "在系统设计阶段，要根据系统分析阶段的结果，设计新系统的物理模型。", "explanation": {"text": "信息系统开发流程：\n系统分析阶段：梳理需求、业务流程，构建逻辑模型（做什么）；\n系统设计阶段：依据分析得出的逻辑模型，进行架构、数据库、模块、软硬件选型等设计，生成物理模型（怎么做、具体实现方案）。\n题干表述符合系统开发规范，判断正确。", "images": []}, "options": [{"id": "T", "text": "对", "correct": true}, {"id": "F", "text": "错", "correct": false}]}, {"id": 58, "type": "judgment", "chapter": "python", "stem": "使用三引号创建字符串时不允许使用转义符。", "explanation": {"text": "Python 三引号（\"\"\"...\"\"\" / '''...'''）的特点是可以直接换行、单双引号不用转义，但依然支持转义字符（\\n、\\t、\\\\ 等均可正常解析生效）。\n示例：\npython\n运行\ns = \"\"\"第一行\\n第二行\\t制表符\\\\反斜杠\"\"\"\nprint(s)\n代码里 \\n、\\t、\\\\ 转义都会正常起效，因此 “不允许使用转义符” 的说法错误。", "images": []}, "options": [{"id": "T", "text": "对", "correct": false}, {"id": "F", "text": "错", "correct": true}]}, {"id": 59, "type": "judgment", "chapter": "python", "stem": "Numpy的Series对象在进行运算时，其默认索引值是0到n-1可以参与运算，而自定义索引值不会参与运算。", "explanation": {"text": "Series 是 Pandas 对象，不是 Numpy 对象；\nSeries 运算对齐规则是按索引匹配运算，不管是默认 0~n-1 整数索引，还是自定义标签索引，都会以索引为匹配依据参与计算；\n索引不匹配的位置结果为 NaN，并非自定义索引不参与运算。\n因此题干表述错误。", "images": []}, "options": [{"id": "T", "text": "对", "correct": false}, {"id": "F", "text": "错", "correct": true}]}, {"id": 60, "type": "judgment", "chapter": "bigdata", "stem": "在Shark原有的架构上重写了逻辑执行计划的优化部分，解决了Shark存在的问题。", "explanation": null, "options": [{"id": "T", "text": "对", "correct": true}, {"id": "F", "text": "错", "correct": false}]}, {"id": 61, "type": "single", "chapter": "ethics", "stem": "下列关于职业道德的说法中，正确的是（ ）。", "explanation": null, "options": [{"id": "A", "text": "职业道德的形式因行业不同而有所不同", "correct": false}, {"id": "B", "text": "职业道德在内容上具有变动性", "correct": false}, {"id": "C", "text": "职业道德在适用范围上具有普遍性", "correct": true}, {"id": "D", "text": "讲求职业道德会降低企业竞争力", "correct": false}]}, {"id": 62, "type": "single", "chapter": "ethics", "stem": "提高生产效率,促进企业发展的重中之重是(  )。", "explanation": null, "options": [{"id": "A", "text": "文明礼貌", "correct": false}, {"id": "B", "text": "团结互助", "correct": true}, {"id": "C", "text": "自学成才", "correct": false}, {"id": "D", "text": "勤劳品质", "correct": false}]}, {"id": 63, "type": "single", "chapter": "ethics", "stem": "最能促进事业发展的是（  ）。", "explanation": null, "options": [{"id": "A", "text": "企业内耗", "correct": false}, {"id": "B", "text": "我行我素", "correct": false}, {"id": "C", "text": "个人技术水平高", "correct": false}, {"id": "D", "text": "团结互助", "correct": true}]}, {"id": 64, "type": "single", "chapter": "image", "stem": "下列文件格式中，（  ）是静态图像压缩标准。", "explanation": {"text": "JPEG：静态图像压缩编码标准，用于压缩图片，正确。\nMPEG：动态视频压缩标准，针对视频文件。\nPAL、NTSC：两种不同的模拟电视制式，和图像压缩无关。", "images": []}, "options": [{"id": "A", "text": "PAL", "correct": false}, {"id": "B", "text": "JPEG", "correct": true}, {"id": "C", "text": "MPEG", "correct": false}, {"id": "D", "text": "NTSC", "correct": false}]}, {"id": 65, "type": "single", "chapter": "computer", "stem": "发现病毒后，比较彻底的去除方式是(  )。", "explanation": null, "options": [{"id": "A", "text": "用查毒软件处理", "correct": false}, {"id": "B", "text": "用杀毒软件处理", "correct": false}, {"id": "C", "text": "删除磁盘文件", "correct": false}, {"id": "D", "text": "格式化磁盘", "correct": true}]}, {"id": 66, "type": "single", "chapter": "computer", "stem": "Excel的缺省工作簿名称是(   )。", "explanation": {"text": "book1：Excel 新建空白工作簿默认名称；Book1 是整个工作簿（文件）默认名称（窗口最顶部标题栏写着「工作簿 1」，对应 Windows 版默认 Book1）\nsheet1：是工作簿里第一张工作表的默认名字，不是工作簿名；Sheet1 是工作表名称（你截图左下角看到的就是它）\n文档 1：是 Word 默认文档名；\nDOC：Word 旧版文件扩展名。", "images": ["data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABX0AAANkCAYAAADr5ompAAAAAXNSR0IArs4c6QAAAIRlWElmTU0AKgAAAAgABQESAAMAAAABAAEAAAEaAAUAAAABAAAASgEbAAUAAAABAAAAUgEoAAMAAAABAAIAAIdpAAQAAAABAAAAWgAAAAAAAABIAAAAAQAAAEgAAAABAAOgAQADAAAAAQABAACgAgAEAAAAAQAABX2gAwAEAAAAAQAAA2QAAAAAyAi9qwAAAAlwSFlzAAALEwAACxMBAJqcGAAAQABJREFUeAHsnQW8VcUaxT+6EaUlxUDCTh52Cyr67EBFUTGerdhiYftsxcTCbrEeKirYYr Wm7IEu0/Ry78dxpcrJIoAAAggggAACCCCAAAIIIIAAAkcpUA/j0Ed5JmxWpwJe9Xq5jupUv04PpgF9z4fGb/XRxJRvaGKCvXr/rR49ekhTU9bjww8/tPc/u/LKK03AN6KszIdun5qaWqo1bDVVXO8up4+V5m5/aWlp9uZVugMtYK6RY21aRFr767Pz0Hl90BBAAAEEEEAAAQQQQAABBBBAAIH6JKA/c65vTctq0hBAAIGKBBo3bixao1kfWqNXnzWrV6c1bquVGbREzLp162ywd/DgwaZk72Bb5qORKffRpLGp79woRP4f7G4rbKw3XpcAAAAASUVORK5CYII="]}, "options": [{"id": "A", "text": "文档1", "correct": false}, {"id": "B", "text": "sheet1", "correct": false}, {"id": "C", "text": "book1", "correct": true}, {"id": "D", "text": "DOC", "correct": false}]}, {"id": 67, "type": "single", "chapter": "computer", "stem": "退出当前应用程序的运行的快捷键是(   ) 。", "explanation": null, "options": [{"id": "A", "text": "ALT+F4", "correct": true}, {"id": "B", "text": "ALT+F5", "correct": false}, {"id": "C", "text": "ALT+F6", "correct": false}, {"id": "D", "text": "ALT+F7", "correct": false}]}, {"id": 68, "type": "single", "chapter": "law", "stem": "劳动者提前（  ）以书面形式通知用人单位，可以解除劳动合同。", "explanation": null, "options": [{"id": "A", "text": "十五日", "correct": false}, {"id": "B", "text": "三十日", "correct": true}, {"id": "C", "text": "六十日", "correct": false}, {"id": "D", "text": "三个月", "correct": false}]}, {"id": 69, "type": "single", "chapter": "network", "stem": "关键信息基础设施的运营者采购网络产品和服务，应当按照规定与提供者签订（    ），明确安全和保密义务与责任。", "explanation": {"text": "法条依据\n《网络安全法》第三十八条明确规定：\n关键信息基础设施的运营者采购网络产品和服务，应当按照规定与提供者签订安全保密协议，明确安全和保密义务与责任中央网络安...。\n《关键信息基础设施安全保护条例》第二十条也作出相同配套规定中国政府网。\n其他选项辨析\n安全服务合同：侧重技术运维服务约定，不是法定采购必备文书；\n安全责任条款：只是协议里一部分内容，并非完整签约文件名称；\n保密合同：只侧重保密，缺少网络安全相关权责约定，不符合法条完整表述。", "images": []}, "options": [{"id": "A", "text": "安全服务合同", "correct": false}, {"id": "B", "text": "安全责任条款", "correct": false}, {"id": "C", "text": "保密合同", "correct": false}, {"id": "D", "text": "安全保密协议", "correct": true}]}, {"id": 70, "type": "single", "chapter": "general", "stem": "两个8位二进制数进行比较，不考虑硬件成本，以下输出信号哪个时延最短（）。", "explanation": {"text": "原理分析\n8 位数值比较器逻辑结构\n设两个 8 位数 A=A7​⋯A0​、B=B7​⋯B0​\n相等信号 A=B：只有每一位都满足 Ai​=Bi​ 才成立，每一位同或后逐级与运算，逻辑路径层级最少；\n大于 A>B、小于 A<B：从最高位逐位判断，一旦某一位不等就输出结果，需要多级判断分支逻辑，门电路级数更多，传输时延更长。\n时延本质\n门电路延迟由逻辑级数决定。相等判断的组合逻辑深度最小，因此传输时延最短。\n所以：等于信号时延最短。", "images": []}, "options": [{"id": "A", "text": "大于", "correct": false}, {"id": "B", "text": "等于", "correct": true}, {"id": "C", "text": "都一样", "correct": false}, {"id": "D", "text": "小于", "correct": false}]}, {"id": 71, "type": "single", "chapter": "hardware", "stem": "在多位加法器中，影响加法器运算速度的关键因素是（）。", "explanation": {"text": "串行进位加法器中，每一位的加法运算必须等待低位产生进位信号之后才能完成，进位需要逐位依次传递，进位逐级传递产生的延迟是限制多位加法器运算速度最核心的瓶颈。\n其他选项辨析\n各位加法器速度不同：并非普遍关键制约因素；\n元器件速度：属于硬件基础属性，不是加法器内部影响运算快慢的特有关键因素；\n门电路的级延迟：是进位延迟产生的底层原因，题目针对加法器特有核心制约因素，答案为进位传递延迟。", "images": []}, "options": [{"id": "A", "text": "各位加法器速度的不同", "correct": false}, {"id": "B", "text": "元器件速度", "correct": false}, {"id": "C", "text": "门电路的级延迟", "correct": false}, {"id": "D", "text": "进位传递延迟", "correct": true}]}, {"id": 72, "type": "single", "chapter": "hardware", "stem": "假设一个门电路时间延迟为T，全部采用2输入门电路构成的一位全加器时间延迟是（）。", "explanation": {"text": "", "images": ["data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAvwAAAEmCAIAAACRd9MMAAAAAXNSR0IArs4c6QAAAIRlWElmTU0AKgAAAAgABQESAAMAAAABAAEAAAEaAAUAAAABAAAASgEbAAUAAAABAAAAUgEoAAMAAAABAAIAAIdpAAQAAAABAAAAWgAAAAAAAABIAAAAAQAAAEgAAAABAAOgAQADAAAAAQABAACgAgAEAAAAAQAAAvygAwAEAAAAAQAAASYAAAAAe/cdRgAAAAlwSFlzAAALEwAACxMBAJqcGAAAQABJREFUeAHs3XncdlMVP/6fsSKiDKVBoSTSpMFQQtFAaVIaJaJBaTBEylAqlURJSopEGkhKaaSkOZJCEooGkSlF4ff+Wr/f+u7XOdd93dd9PfdzP/Vc6/xxP/vss6fz2Wuv9Vlr73M9i/znP//5f+oqBAqBQqAQKAQKgUJgYUdg0YX9Bev9CoFCoBAoBAqBQqAQ+D8IFOkpOSgECoFCoBAoBAqBiUCgSM9ETHO9ZCFQCBQChUAhUAgU6SkZKAQKgUKgECgECoGJQKBIz0RMc71kIVAIFAKFQCFQCBTpKRkoBAqBQqAQKAQKgYlAoEjPRExzvWQhUAgUAoVAIVAIjER6fvvb377//e+/8MILA68bbrjhhBNOuOyyyy644IJPfepTfRBvueWWfw292ioK/uEPf2hz2vRXvvKVj370o21Opq+44orvfOc7V1111b///e9+b7feemuWrEQhUAgUAoVAIVAIFAIjkZ7zzjtvjz32+PnPfx54nXjiiS9+8Yt/9KMfHX/88a94xSt+9atfdXDcdNNN7zr0uummm7KKptZbb70zzjgjc9oExrPbbrtlDnKj/KMf/ejllltu1VVXffKTn/y+973vmc98Zr+3gw8+OGtVohAoBAqBQqAQKAQKgcXHgODoo49eeumlH/KQh6y44orvfOc7P/7xj7/mNa/R ect", "stem": "（）是将知识、能力、工具和技术应用到项目活动上，以满足项目需求。", "explanation": null, "options": [{"id": "A", "text": "项目群管理", "correct": false}, {"id": "B", "text": "项目管理", "correct": true}, {"id": "C", "text": "项目组合管理", "correct": false}, {"id": "D", "text": "需求管理", "correct": false}]}, {"id": 76, "type": "single", "chapter": "project", "stem": "项目质量管理的目的是（）。", "explanation": null, "options": [{"id": "A", "text": "尽可能生产出最高质量的产品和服务", "correct": false}, {"id": "B", "text": "确保符合相应的质量标准", "correct": false}, {"id": "C", "text": "确保项目满足它所应满足的需求", "correct": true}, {"id": "D", "text": "上述所有", "correct": false}]}, {"id": 77, "type": "single", "chapter": "project", "stem": "在拟定项目初步成本估算时，项目经理最初需要的资料是（） 。", "explanation": null, "options": [{"id": "A", "text": "核查估算过程", "correct": false}, {"id": "B", "text": "成本管理计划", "correct": true}, {"id": "C", "text": "现有的历史数据", "correct": false}, {"id": "D", "text": "自下而上的估算", "correct": false}]}, {"id": 78, "type": "single", "chapter": "project", "stem": "一个（）报告描述了项目在一个特定的时间点所处的位置。", "explanation": {"text": "绩效报告（Performance Report）\n定期汇总项目进度、成本、工作量等实际执行数据，用来描述项目在某个特定时间点的整体所处位置、完成情况与偏差，匹配题干定义。\n其余选项辨析\n状态报告：侧重单点事项、问题、风险的当前情况，不是用来定位项目整体阶段位置的标准报告名称；\n预测报告：面向未来，预估后续完工成本、完工工期，不是描述当下时点位置；\n挣值：是一套进度 / 成本分析技术方法，不是报告类型。", "images": []}, "options": [{"id": "A", "text": "状态", "correct": false}, {"id": "B", "text": "绩效", "correct": true}, {"id": "C", "text": "预测", "correct": false}, {"id": "D", "text": "挣值", "correct": false}]}, {"id": 79, "type": "single", "chapter": "computer", "stem": "按照数据的动态特性划分,具有随机变动属性的数据应放在(      )。", "explanation": {"text": "答案\n一、四类文件按数据动态特性定义\n主文件：存放固定属性、半固定属性数据（比如员工姓名、编号、基础岗位信息，变动很少）。\n处理文件（事务文件）：存放随机变动属性数据，是业务发生时临时产生、随机性更新的数据（如每日销售订单、领料记录、交易流水，发生时间不定、数值随机变化），用来批量更新主文件。\n周转文件：存放周期性固定变动数据（如每月工资代扣、定期应收应付，按周期规律变动，并非随机发生）。\n后备文件：主文件 / 重要文件的备份副本，不属于存放业务变动数据的分类。\n结论\n随机变动属性数据，归类存入处理文件。", "images": []}, "options": [{"id": "A", "text": "周转文件中", "correct": false}, {"id": "B", "text": "处理文件中", "correct": true}, {"id": "C", "text": "主文件中", "correct": false}, {"id": "D", "text": "后备文件中", "correct": false}]}, {"id": 80, "type": "single", "chapter": "python", "stem": "下列选项中，用于将各种类型的数据（字符串、整数、浮点数、列表、字典等）输出到屏幕上的函数是（    ）。", "explanation": null, "options": [{"id": "A", "text": "input", "correct": false}, {"id": "B", "text": "eval", "correct": false}, {"id": "C", "text": "get", "correct": false}, {"id": "D", "text": "print", "correct": true}]}, {"id": 81, "type": "single", "chapter": "python", "stem": "不定长的位置参数在传递给函数时会被封装成（    ）。", "explanation": {"text": "Python 函数参数规则：\n不定长位置参数 *args\n传入多个零散位置实参时，会自动打包封装成元组（tuple）。\n示例：\npython\n运行\ndef func(*args):\n    print(type(args))\nfunc(1,2,3)  # 输出 <class 'tuple'>\n不定长关键字参数 **kwargs\n才会封装成字典，和本题不符。\n列表、集合都不是该参数默认封装类型。", "images": []}, "options": [{"id": "A", "text": "字典", "correct": false}, {"id": "B", "text": "元组", "correct": true}, {"id": "C", "text": "列表", "correct": false}, {"id": "D", "text": "集合", "correct": false}]}, {"id": 82, "type": "single", "chapter": "image", "stem": "​频谱均匀分布的噪声被称为(  )。", "explanation": null, "options": [{"id": "A", "text": "高斯噪声", "correct": false}, {"id": "B", "text": "椒盐噪声", "correct": false}, {"id": "C", "text": "白噪声", "correct": true}, {"id": "D", "text": "随机噪声", "correct": false}]}, {"id": 83, "type": "single", "chapter": "image", "stem": "下列算法中属于图像锐化处理的是(  )。", "explanation": {"text": "原理辨析\n高通滤波（图像锐化）\n图像边缘、细节属于高频分量，高通滤波器允许高频信号通过、抑制低频平缓区域，突出边缘轮廓，实现锐化。\n低通滤波（图像平滑 / 模糊）\n保留低频、滤除高频噪声，用来降噪、模糊图像，属于平滑处理，不是锐化。\n加权平均\n典型低通平滑算法，邻域加权求和，图像变模糊。\n中值滤波\n非线性平滑算法，主要去除椒盐噪声，同样是平滑操作。\n总结：\n✅ 锐化 → 高通滤波", "images": []}, "options": [{"id": "A", "text": "中值滤波", "correct": false}, {"id": "B", "text": "加权平均", "correct": false}, {"id": "C", "text": "低通滤波", "correct": false}, {"id": "D", "text": "高通滤波", "correct": true}]}, {"id": 84, "type": "single", "chapter": "image", "stem": "对一幅数字图像来说，若以8位二进制存储，则该图像可以有（     ）灰度级。", "explanation": {"text": "计算推导\n灰度级数计算公式：灰度级数=2存储位数\n本题位数为 8 位：\n28=256\n取值范围：0∼255，一共 256 个不同灰度等级。", "images": []}, "options": [{"id": "A", "text": "8", "correct": false}, {"id": "B", "text": "64", "correct": false}, {"id": "C", "text": "256", "correct": true}, {"id": "D", "text": "512", "correct": false}]}, {"id": 85, "type": "single", "chapter": "bigdata", "stem": "以下关于分布式文件系统HDFS的说法不正确的是：(  )。", "explanation": {"text": "数据块（Block）是 HDFS 文件系统基本的存储单位\n正确，HDFS 默认块大小 128MB，文件会切分成若干 Block 分散存储在 DataNode。\nHDFS 支持多用户写入，任意修改文件（错误选项）\nHDFS 设计为一次写入、多次读取：\n一个文件同一时刻只允许一个写入进程；\n不支持文件随机修改、随机覆盖，仅支持末尾追加写入，不能任意修改文件内容。\nHDFS 支持存储 TB-PB 级别的数据\n正确，HDFS 就是面向超大海量数据的分布式存储设计。\nHDFS 是能够运行在通用硬件上的分布式文件系统\n正确，HDFS 无需高端专用存储设备，可部署在普通廉价商用服务器集群。", "images": []}, "options": [{"id": "A", "text": "数据块（Block）是HDFS文件系统基本的存储单位", "correct": false}, {"id": "B", "text": "HDFS支持多用户写入，任意修改文件", "correct": true}, {"id": "C", "text": "HDFS支持存储TB-PB级别的数据", "correct": false}, {"id": "D", "text": "HDFS是能够运行在通用硬件上的分布式文件系统", "correct": false}]}, {"id": 86, "type": "single", "chapter": "general", "stem": "以下关于类和单例对象的对比说法正确的是()。", "explanation": {"text": "逐项解析\n选项 1：单例对象不可以继承，而类可以 → 错误\n单例模式的类本身依然可以被继承，只是子类实现单例需要特殊处理；并非单例不能继承。\n选项 2：单例对象不可以带参数，而类可以 → 正确\n普通类实例化：obj = ClassA(参数1,参数2)，构造方法可自由传参；\n标准单例全局只有一个实例，在程序初始化时就已创建完成，后续无法再传入自定义参数创建新实例；如果允许传参多次构造，就违背 “唯一实例” 的单例核心定义。\n选项 3：单例对象不可以定义私有属性，而类可以 → 错误\n单例本质依旧是类生成的对象，完全可以在单例类内部定义私有属性、私有变量，和普通类没有区别。\n选项 4：单例对象不可以定义方法，而类可以 → 错误\n单例类中可以正常定义实例方法、静态方法，单例对象也能正常调用自身方法。\n总结\n单例约束核心：全局唯一实例，无法外部传参反复构造，对应正确选项为第二条。", "images": []}, "options": [{"id": "A", "text": "单例对象不可以继承，而类可以", "correct": false}, {"id": "B", "text": "单例对象不可以带参数，而类可以", "correct": true}, {"id": "C", "text": "单例对象不可以定义私有属性，而类可以", "correct": false}, {"id": "D", "text": "单例对象不可以定义方法，而类可以", "correct": false}]}, {"id": 87, "type": "single", "chapter": "bigdata", "stem": "下面描述正确的是：(  )。", "explanation": {"text": "逐项解析\nHadoop 和 Spark 不能部署在同一个集群中 → 错误\nSpark 可以运行在 YARN（Hadoop 资源调度框架）之上，二者完全可以部署在同一套服务器集群协同工作。\nHadoop 只包含了存储组件，不包含计算组件 → 错误\nHadoop 核心三大组件：\nHDFS（分布式存储）\nYARN（资源调度）\nMapReduce（原生分布式计算引擎）\n自带计算组件 MapReduce。\nSpark 是一个分布式计算框架，可以和 Hadoop 组合使用 → 正确\nSpark 是内存式分布式计算引擎，常基于 Hadoop 的 HDFS 存数据、YARN 做资源调度，是非常经典的搭配方案。\nSpark 和 Hadoop 是竞争关系，二者不能组合使用 → 错误\n二者并非完全竞品，Spark 常用来替代 Hadoop 原生 MapReduce 做更快的运算，可深度搭配使用。", "images": []}, "options": [{"id": "A", "text": "Hadoop和Spark不能部署在同一个集群中", "correct": false}, {"id": "B", "text": "Hadoop只包含了存储组件，不包含计算组件", "correct": false}, {"id": "C", "text": "Spark是一个分布式计算框架，可以和Hadoop组合使用", "correct": true}, {"id": "D", "text": "Spark和Hadoop是竞争关系，二者不能组合使用", "correct": false}]}, {"id": 88, "type": "single", "chapter": "search_knowledge", "stem": "下面关于爬山法的说法中错误的是：( )。", "explanation": {"text": "逐项解析\n爬山法是一种贪心算法。✅正确\n爬山法每一步只选择当前局部最优方向前进，符合贪心算法局部最优的特征。\n爬山法是一种局部择优的方法。✅正确\n它只对比当前邻域内的状态，挑选收益最大的下一步，只做局部最优决策，无法全局寻优。\n爬山法没有能力从错误中或错误路径中恢复。✅正确\n一旦走入局部极值点、平顶、山脊等困境，算法没有回溯机制，无法退回之前节点换其他路径尝试，不能纠错折返。\n爬山法需要保存未选择路径的记录。❌错误（本题答案）\n爬山法属于深度优先类贪心搜索，仅保留当前所在节点，不会记录、存储其他分支未走的路径，节省内存；需要保存备选路径的是回溯搜索、广度优先搜索等算法。", "images": []}, "options": [{"id": "A", "text": "爬山法是一种贪心算法。", "correct": false}, {"id": "B", "text": "爬山法是一种局部择优的方法。", "correct": false}, {"id": "C", "text": "爬山法没有能力从错误中或错误路径中恢复。", "correct": false}, {"id": "D", "text": "爬山法需要保存未选择路径的记录。", "correct": true}]}, {"id": 89, "type": "single", "chapter": "search_knowledge", "stem": "反演归结（消解）证明定理时，若当前归结式是（     ）时，则定理得证。", "explanation": {"text": "原理说明\n归结反演证明步骤：\n将待证明结论取反，连同已知前提公式一起转化为子句集；\n反复对子句进行归结（消解）运算；\n若归结推导出空子句（□），代表出现矛盾，原假设（结论取反）不成立，原定理成立，证明完成。\n其余选项辨析\n永假式：只是恒假公式，不等于归结证明终止标志；\n包孕式：一个子句包含另一个子句，可做子句化简删除，不是证明结束条件；\n永真式：恒真公式，和归结反演推出矛盾的目标相反。", "images": []}, "options": [{"id": "A", "text": "永假式", "correct": false}, {"id": "B", "text": "包孕式", "correct": false}, {"id": "C", "text": "空子句", "correct": true}, {"id": "D", "text": "永真式", "correct": false}]}, {"id": 90, "type": "single", "chapter": "search_knowledge", "stem": "以下不是专家系统获取模式的是（    ）。", "explanation": {"text": "专家系统公认的三种知识获取模式：\n非自动知识获取（人工获取）\n由知识工程师直接从领域专家处提取知识，整理录入知识库，最传统方式。\n半自动知识获取\n借助编辑器、知识辅助工具，专家自主录入、修改知识，人机配合完成。\n自动知识获取\n系统自带学习能力，从文本、数据、案例中自动抽取、归纳知识，无需人工大量整理。\n不存在 “被动知识获取” 这个标准分类名称，因此它不属于专家系统知识获取模式。", "images": []}, "options": [{"id": "A", "text": "自动知识获取", "correct": false}, {"id": "B", "text": "被动知识获取", "correct": true}, {"id": "C", "text": "半自动知识获取", "correct": false}, {"id": "D", "text": "非自动知识获取", "correct": false}]}, {"id": 91, "type": "single", "chapter": "general", "stem": "描述⼀种语⾔的途径不包括（  ）。", "explanation": {"text": "逐项解析\n穷举法 ✅ 是描述语言的途径\n针对有限语言，可以把语言所有字符串全部枚举罗列出来，用来定义该语言。\n文法描述 ✅ 是描述语言的途径\n通过产生式规则（文法）生成对应全部句子，是形式语言最常用表达方式。\n自动机法 ✅ 是描述语言的途径\n有限自动机、下推自动机等，通过识别接收字符串来定义一门语言。\n形式文法 ❌ 不属于独立途径（本题答案）\n形式文法本身就是「文法描述」这个途径对应的具体概念，二者是同一类东西，不是第三种、第四种独立描述语言的途径；题目问 “不包括” 的选项，因此选形式文法。\n补充梳理三种独立描述语言方式：\n枚举（穷举）表示\n文法生成表示\n自动机识别表示\n形式文法只是文法表示里的具体名词，不是并列的另一途径。", "images": []}, "options": [{"id": "A", "text": "穷举法", "correct": false}, {"id": "B", "text": "文法描述", "correct": false}, {"id": "C", "text": "⾃动机法", "correct": false}, {"id": "D", "text": "形式⽂法", "correct": true}]}, {"id": 92, "type": "single", "chapter": "ml_ai", "stem": "下列哪些属于循环神经网络（  ）。", "explanation": {"text": "1.LeNet\n经典卷积神经网络（CNN），用于手写数字图像识别，不含循环结构。\n2.GoogleNet（Inception 网络）\n深度卷积神经网络（CNN），依靠多分支 Inception 模块提取图像特征，不属于循环网络。\n3.Bi-LSTM（双向长短期记忆网络）✅\nLSTM 是 ** 循环神经网络（RNN）** 的改进变体，解决传统 RNN 梯度消失问题；双向结构可同时利用上下文时序信息，属于典型循环神经网络。\n4.BERT\n基于Transformer 自注意力机制的预训练模型，无循环递归结构，不属于 RNN 类网络。", "images": []}, "options": [{"id": "A", "text": "LeNet", "correct": false}, {"id": "B", "text": "GoogleNet", "correct": false}, {"id": "C", "text": "Bi-LSTM", "correct": true}, {"id": "D", "text": "BERT", "correct": false}]}, {"id": 93, "type": "single", "chapter": "python", "stem": "jupyter notebook运⾏本单元的快捷键（  ）。", "explanation": {"text": "三个常用运行快捷键区分\nCtrl + Enter：运行当前单元格，光标停留在本单元格（本题答案）\nShift + Enter：运行当前单元格，自动跳到下一个单元格\nAlt + Enter：运行当前单元格，并在下方自动新建一个空白单元格\nESC+Enter 不是 Jupyter 有效运行快捷键", "images": []}, "options": [{"id": "A", "text": "ALT+Enter", "correct": false}, {"id": "B", "text": "Ctrl+Enter", "correct": true}, {"id": "C", "text": "Shift+Enter", "correct": false}, {"id": "D", "text": "ESC+Enter", "correct": false}]}, {"id": 94, "type": "single", "chapter": "ml_ai", "stem": "Tensorboard日志书写器实例化语句（  ）。", "explanation": null, "options": [{"id": "A", "text": "merged = tf.summary.merge_all()", "correct": true}, {"id": "B", "text": "降维算法", "correct": false}, {"id": "C", "text": "异常检测算法", "correct": false}, {"id": "D", "text": "分割算法", "correct": false}]}, {"id": 95, "type": "single", "chapter": "ml_ai", "stem": "下列哪个函数不可以做激活函数（  ）。", "explanation": {"text": "原理：激活函数的核心作用\n激活函数必须引入非线性变换；如果没有非线性，无论堆叠多少层网络，整体依然等价于单层线性模型，无法拟合复杂非线性问题。\n逐项分析\ny=tanh(x)\n双曲正切函数，典型非线性激活函数，常用于循环神经网络。\ny=sin(x)\n正弦函数是非线性函数，可以充当激活函数（周期性非线性映射）。\ny=max(x,0)\nReLU 激活函数，深度学习最常用非线性激活。\ny=2x\n属于线性函数，多层叠加后仍是线性运算，无法赋予网络非线性表达能力，不能作为激活函数。", "images": []}, "options": [{"id": "A", "text": "y = tanh(x)", "correct": false}, {"id": "B", "text": "y = sin(x)", "correct": false}, {"id": "C", "text": "y = max(x,0)", "correct": false}, {"id": "D", "text": "y = 2x", "correct": true}]}, {"id": 96, "type": "single", "chapter": "ml_ai", "stem": "在数据挖掘中，将大数据集转换为保持原数据完整性的小数据集，这一过程称为（）。", "explanation": {"text": "概念解析\n数据归约：在尽可能保留原有数据信息完整性、关键特征的前提下，降低数据规模（减少样本量、属性维度等），得到精简数据集，降低后续运算开销，完全匹配题干描述。\n其余选项辨析\n数据提取：从数据源抽取所需字段 / 记录，不是压缩缩减数据集；\n数据变换：规范化、归一化、离散化等，只是改变数据取值形式，数据集大小基本不变；\n数据清理：处理缺失值、异常值、重复脏数据，目的是修正错误数据，并非主动精简数据集。", "images": []}, "options": [{"id": "A", "text": "数据提取", "correct": false}, {"id": "B", "text": "数据变换", "correct": false}, {"id": "C", "text": "数据清理", "correct": false}, {"id": "D", "text": "数据归约", "correct": true}]}, {"id": 97, "type": "single", "chapter": "datastructure", "stem": "线性表是（）。", "explanation": null, "options": [{"id": "A", "text": "一个有限序列，可以为空", "correct": true}, {"id": "B", "text": "一个无限序列，可以为空", "correct": false}, {"id": "C", "text": "一个无限序列，不可以为空", "correct": false}, {"id": "D", "text": "一个有限序列，不可以为空", "correct": false}]}, {"id": 98, "type": "single", "chapter": "datastructure", "stem": "设有两个长度都为n的单向链表，结点类型相同。若以h1为表头指针的链表是非循环的，以h2为表头指针的链表是循环的，则（）。", "explanation": null, "options": [{"id": "A", "text": "循环链表要比非循环链表占用更多的内存空间", "correct": false}, {"id": "B", "text": "h1和h2是不同类型的变量", "correct": false}, {"id": "C", "text": "对于两个链表来说，删除第一个结点的操作，其时间复杂性都是O（1）", "correct": false}, {"id": "D", "text": "对于两个链表来说，删除最后一个结点的操作，其时间复杂性都是O（n）", "correct": true}]}, {"id": 99, "type": "single", "chapter": "hardware", "stem": "初始化后，总线的主控制器是（）。", "explanation": null, "options": [{"id": "A", "text": "CPU", "correct": true}, {"id": "B", "text": "总线", "correct": false}, {"id": "C", "text": "DMA控制单元", "correct": false}, {"id": "D", "text": "总线控制单元", "correct": false}]}, {"id": 100, "type": "single", "chapter": "network", "stem": "在无线通信中由于（    ）的特性，信息传递会受到各种干扰，断接不可避免。", "explanation": null, "options": [{"id": "A", "text": "数据流量", "correct": false}, {"id": "B", "text": "续航能力", "correct": false}, {"id": "C", "text": "传输载体", "correct": true}, {"id": "D", "text": "基础设施", "correct": false}]}, {"id": 101, "type": "multiple", "chapter": "computer", "stem": "Office办公自动化套件包括的组件有（ ）。", "explanation": null, "options": [{"id": "A", "text": "Word", "correct": true}, {"id": "B", "text": "Excel", "correct": true}, {"id": "C", "text": "Powerpoint", "correct": true}, {"id": "D", "text": "Access", "correct": true}, {"id": "E", "text": "Publishe", "correct": true}]}, {"id": 102, "type": "multiple", "chapter": "general", "stem": "通常把矩形波高电平的（）与（）之比称为（）。", "explanation": null, "options": [{"id": "A", "text": "时间", "correct": true}, {"id": "B", "text": "周期", "correct": true}, {"id": "C", "text": "占空比", "correct": true}, {"id": "D", "text": "动作", "correct": false}, {"id": "E", "text": "状态", "correct": false}]}, {"id": 103, "type": "multiple", "chapter": "project", "stem": "生命周期法（结构化开发）是（）的，由（）出发，按（）完成开发。", "explanation": null, "options": [{"id": "A", "text": "自上而下", "correct": true}, {"id": "B", "text": "布局", "correct": false}, {"id": "C", "text": "全局", "correct": true}, {"id": "D", "text": "顺序", "correct": false}, {"id": "E", "text": "名称", "correct": true}]}, {"id": 104, "type": "multiple", "chapter": "image", "stem": "大数据中的非结构化数据包括 （ ）。", "explanation": null, "options": [{"id": "A", "text": "图像", "correct": true}, {"id": "B", "text": "视频", "correct": true}, {"id": "C", "text": "语音", "correct": true}, {"id": "D", "text": "文本", "correct": true}, {"id": "E", "text": "整数", "correct": false}]}, {"id": 105, "type": "multiple", "chapter": "general", "stem": "⽀持向量机学习模型包括（   ）。", "explanation": null, "options": [{"id": "A", "text": "线性可分⽀持向量机", "correct": true}, {"id": "B", "text": "线性⽀持", "correct": true}, {"id": "C", "text": "⾮线性⽀持向量机", "correct": true}, {"id": "D", "text": "硬间隔最⼤化", "correct": false}, {"id": "E", "text": "软间隔最⼤化", "correct": false}]}, {"id": 106, "type": "multiple", "chapter": "search_knowledge", "stem": "在数据不完备时，贝叶斯网络的参数学习方法有（     ）。", "explanation": {"text": "：\n最大似然估计\n仅适用于数据完备场景；存在缺失数据时直接 MLE 求解不可行，需要 EM 迭代改进，因此不属于数据不完备下的参数学习方法。\n高斯逼近（拉普拉斯高斯近似）\n不完备数据下常用的贝叶斯后验近似求解手段，用于贝叶斯网络参数学习。\n蒙特卡洛方法（MCMC 等采样类方法）\n处理缺失数据、后验积分难以解析求解时的经典数值采样方案，是不完备数据贝叶斯参数学习主流方法。\n拉普拉斯近似\n用高斯分布近似参数后验分布，解决缺失数据下积分难解问题，属于不完备数据近似学习方法。\n弗洛伊德算法（Floyd）\n是图论中求解多源最短路径的算法，和贝叶斯网络参数学习无关。", "images": []}, "options": [{"id": "A", "text": "高斯逼近", "correct": true}, {"id": "B", "text": "最大似然估计方法", "correct": false}, {"id": "C", "text": "蒙特卡洛方法", "correct": true}, {"id": "D", "text": "拉普拉斯近似", "correct": true}, {"id": "E", "text": "弗洛伊德算法", "correct": false}]}, {"id": 107, "type": "multiple", "chapter": "network", "stem": "设备在()的情况下，无线路由器默认都会进行（），在广播帧中包含了该路由器的（）。", "explanation": {"text": "逐空完整解析\n第一空：设备在 开启 Wi-Fi 的情况下\n路由器只有无线功能打开才会向外发送广播，关闭 Wi-Fi 则不会发送任何无线广播帧。\n第二空：无线路由器默认都会进行 SSID 广播\nSSID 广播是路由器默认行为，用来向周边设备宣告自己无线网络名称，方便手机、电脑搜到该 WiFi。\n第三空：在广播帧中包含了该路由器的 MAC 地址\n无线管理帧（Beacon 信标帧）里必然携带路由器无线网卡 MAC 地址；\nIP 地址属于三层网络地址，不会封装在二层广播信标帧里；", "images": []}, "options": [{"id": "A", "text": "开启Wi-Fi", "correct": true}, {"id": "B", "text": "关闭Wi-Fi", "correct": false}, {"id": "C", "text": "SSID广播", "correct": true}, {"id": "D", "text": "MAC地址", "correct": true}, {"id": "E", "text": "IP地址", "correct": false}]}, {"id": 108, "type": "multiple", "chapter": "image", "stem": "下面哪一个是图像输入设备（ ）。", "explanation": {"text": "数码摄像机：采集动态视频图像，属于图像输入设备\n二维码扫描仪：扫描识别二维码图像，采集图像信息，属于图像输入设备\n照相机：拍摄静态照片，采集图像数据，属于图像输入设备\n鼠标：定位控制类输入设备，不采集图像\n键盘：文字指令输入设备，不采集图像", "images": []}, "options": [{"id": "A", "text": "数码摄像机", "correct": true}, {"id": "B", "text": "二维码扫描仪", "correct": true}, {"id": "C", "text": "照相机", "correct": true}, {"id": "D", "text": "鼠标", "correct": false}, {"id": "E", "text": "键盘", "correct": false}]}, {"id": 109, "type": "multiple", "chapter": "ethics", "stem": "教学方法论由教学方法（）、（）、（）、（）四个层面组成。", "explanation": null, "options": [{"id": "A", "text": "指导思想", "correct": true}, {"id": "B", "text": "基本方法", "correct": true}, {"id": "C", "text": "具体方法", "correct": true}, {"id": "D", "text": "教学方式", "correct": true}, {"id": "E", "text": "教学结论", "correct": false}]}, {"id": 110, "type": "multiple", "chapter": "nlp", "stem": "自然语言处理的主要难点包括以下哪些（）。", "explanation": {"text": "逐项解析\n语言独立性：不属于 NLP 难点，概念本身表述不成立，排除\n语言歧义性（难点）\n同一个词句存在一词多义、句法歧义，需要上下文判断真实含义，是自然语言典型难题。\n多国语言：只是处理对象不同，不是算法层面固有的核心难点，排除\n语境（上下文依赖）（难点）\n指代消解、言外之意、对话连贯性都高度依赖上下文，脱离语境很难准确理解语义。\n方言（难点）\n口音、用词、语法不标准，规范化识别、理解难度大，是 NLP 实际落地难点。", "images": []}, "options": [{"id": "A", "text": "语言独立性", "correct": false}, {"id": "B", "text": "语言歧义性", "correct": true}, {"id": "C", "text": "多国语言", "correct": false}, {"id": "D", "text": "语境", "correct": true}, {"id": "E", "text": "方言", "correct": true}]}, {"id": 111, "type": "judgment", "chapter": "hardware", "stem": "总线是计算机各功能部件之间传送信息的公共通道（ ）。", "explanation": null, "options": [{"id": "T", "text": "对", "correct": true}, {"id": "F", "text": "错", "correct": false}]}, {"id": 112, "type": "judgment", "chapter": "general", "stem": "完成指令的⼀个执行步骤所用的时间越短，执行速度越快。（    ）。", "explanation": {"text": "一条完整指令包含取指、译码、执行、写回多个执行步骤，不能只看单个步骤耗时判断整体指令执行速度：\n若采用流水线架构，单步时间短不代表整体吞吐更快，还受流水线冲突、节拍设计影响；\n指令总执行时间 = 所有步骤耗时总和，个别步骤耗时变短，其余步骤耗时很长，整条指令速度未必变快；\n衡量 CPU 执行速度通常看CPI（每条指令平均周期数）、时钟频率、指令总耗时，不能以单个步骤时长片面判定。\n综上题干表述错误。", "images": []}, "options": [{"id": "T", "text": "对", "correct": false}, {"id": "F", "text": "错", "correct": true}]}, {"id": 113, "type": "judgment", "chapter": "general", "stem": "先独立地测试每一个模块, 然后将所有这些模块连接到一起运行测试，这属于系统调试。", "explanation": {"text": "该描述是集成测试的典型流程：先单元测试（单独测试每个模块），再组装模块开展集成测试，验证模块间接口交互是否正常。\n系统调试侧重排查整个完整系统运行故障、定位错误；题干描述并不是系统调试，因此判断错误。", "images": []}, "options": [{"id": "T", "text": "对", "correct": false}, {"id": "F", "text": "错", "correct": true}]}, {"id": 114, "type": "judgment", "chapter": "hardware", "stem": "组合逻辑电路的输出只取决于输入信号的现态。", "explanation": {"text": "组合逻辑电路定义：任意时刻的输出仅由当前输入信号决定，与电路过去的输入、原有状态无关，不含存储元件。\n题目表述 “输出只取决于输入信号的现态” 存在概念问题：\n“现态” 是时序逻辑电路术语，指代存储单元过去保存的历史状态；\n组合电路没有状态、不存在现态，输出只由当前输入决定，不能说成依赖输入现态；\n因此该说法错误。", "images": []}, "options": [{"id": "T", "text": "对", "correct": false}, {"id": "F", "text": "错", "correct": true}]}, {"id": 115, "type": "judgment", "chapter": "general", "stem": "​沟通中存在的主要困难是团队成员互相很难吐露心声。", "explanation": null, "options": [{"id": "T", "text": "对", "correct": true}, {"id": "F", "text": "错", "correct": false}]}, {"id": 116, "type": "judgment", "chapter": "ml_ai", "stem": "偏度是数据分布扁平程度的测度。", "explanation": {"text": "偏度（Skewness）：衡量数据分布左右不对称程度，左偏、右偏、对称分布；\n峰度（Kurtosis）：才是描述数据分布陡峭 / 扁平程度的统计量。\n题干概念混淆，所以判断错误。", "images": []}, "options": [{"id": "T", "text": "对", "correct": false}, {"id": "F", "text": "错", "correct": true}]}, {"id": 117, "type": "judgment", "chapter": "bigdata", "stem": "在Spark SQL编程中需要生成一个StreamingContext对象", "explanation": {"text": "StreamingContext 是 Spark Streaming（旧版微批流处理）的核心上下文对象，不是 Spark SQL 必需对象。\nSpark SQL 常规批处理只需要创建 SparkSession（底层封装 SparkContext）即可完成查询、DataFrame 操作；\n如果是 Spark Structured Streaming（SparkSQL 流处理），依然基于 SparkSession，并不需要 StreamingContext。\n因此题干说法错误。", "images": []}, "options": [{"id": "T", "text": "对", "correct": false}, {"id": "F", "text": "错", "correct": true}]}, {"id": 118, "type": "judgment", "chapter": "general", "stem": "传感器是一种以一定精度将被测量转换为与之有确定对应关系、易于精确处理和测量的某种物理量，一般为电信号的测量部件或装置。", "explanation": null, "options": [{"id": "T", "text": "对", "correct": true}, {"id": "F", "text": "错", "correct": false}]}, {"id": 119, "type": "judgment", "chapter": "nlp", "stem": "由于不同地方不同的文化差异，机器翻译有时会出现歧义。", "explanation": null, "options": [{"id": "T", "text": "对", "correct": true}, {"id": "F", "text": "错", "correct": false}]}, {"id": 120, "type": "judgment", "chapter": "ml_ai", "stem": "神经网络算法是一种聚类数据挖掘算法。", "explanation": {"text": "神经网络不是专门的聚类算法，它是一类通用拟合模型，适用场景非常广泛： \n可用于分类、回归（监督学习主流用法）；\n自编码器、SOM 自组织神经网络可实现聚类，但只是神经网络众多应用之一；\n典型独立聚类算法：K-Means、层次聚类、DBSCAN 等；\n题干直接定义神经网络是聚类算法，表述片面错误。", "images": []}, "options": [{"id": "T", "text": "对", "correct": false}, {"id": "F", "text": "错", "correct": true}]}, {"id": 121, "type": "single", "chapter": "ethics", "stem": "建立职业责任感的途径（ ）。", "explanation": null, "options": [{"id": "A", "text": "强化职业观念", "correct": true}, {"id": "B", "text": "强化岗位规章制度", "correct": false}, {"id": "C", "text": "强调从业人员的具体职责", "correct": false}, {"id": "D", "text": "对从业人员的职业活动进行监督、评价", "correct": false}]}, {"id": 122, "type": "single", "chapter": "ethics", "stem": "在职业活动中,（  ）是为人之本。", "explanation": null, "options": [{"id": "A", "text": "尊重别人", "correct": false}, {"id": "B", "text": "团结互助", "correct": false}, {"id": "C", "text": "学识渊博", "correct": false}, {"id": "D", "text": "诚实守信", "correct": true}]}, {"id": 123, "type": "single", "chapter": "general", "stem": "“一根筷子易折断，十根筷子抱成团”。说明（ ）。", "explanation": null, "options": [{"id": "A", "text": "说明团结就是力量。", "correct": false}, {"id": "B", "text": "团结是个人生存发展的重要条件。", "correct": false}, {"id": "C", "text": "团结是为了实现团队目标奠定基础。", "correct": false}, {"id": "D", "text": "以上都对", "correct": true}]}, {"id": 124, "type": "single", "chapter": "general", "stem": "人工智能训练师是通过分析产品需求和运营异常数据，完成（  ）规则的制定，最终实现产品需求和运营稳定。", "explanation": null, "options": [{"id": "A", "text": "数据标注", "correct": true}, {"id": "B", "text": "数据采集", "correct": false}, {"id": "C", "text": "数据分析", "correct": false}, {"id": "D", "text": "数据清洗", "correct": false}]}, {"id": 125, "type": "single", "chapter": "computer", "stem": "以下关于“回收站”的叙述中，不正确的是（  ）。", "explanation": {"text": "逐项解析\nA 正确：删除到回收站的文件，未清空前可以右键还原恢复。\nB 正确：右键回收站→属性，可以自定义回收站磁盘空间大小，容量可调整。\nC 错误（本题答案）\n软盘、U 盘、移动硬盘等移动存储介质删除文件时，文件直接彻底删除，不会进入回收站；只有本地硬盘删除的文件才移入回收站，该选项描述错误。\nD 正确：回收站本质是磁盘根目录下的隐藏系统文件夹 $Recycle.Bin。", "images": []}, "options": [{"id": "A", "text": "放入回收站的信息可以恢复", "correct": false}, {"id": "B", "text": "回收站的容量可以调整", "correct": false}, {"id": "C", "text": "回收站是专门用于存放从软盘或硬盘上删除的信息", "correct": true}, {"id": "D", "text": "回收站是一个系统文件夹", "correct": false}]}, {"id": 126, "type": "single", "chapter": "computer", "stem": "发现病毒后，比较彻底的去除方式是(  )。", "explanation": null, "options": [{"id": "A", "text": "用查毒软件处理", "correct": false}, {"id": "B", "text": "用杀毒软件处理", "correct": false}, {"id": "C", "text": "删除磁盘文件", "correct": false}, {"id": "D", "text": "格式化磁盘", "correct": true}]}, {"id": 127, "type": "single", "chapter": "computer", "stem": "单元格C1=A1+B1，将公式复制到C2时答案将为(   )。", "explanation": null, "options": [{"id": "A", "text": "A1+B1", "correct": false}, {"id": "B", "text": "A2+B2", "correct": true}, {"id": "C", "text": "A1+B2", "correct": false}, {"id": "D", "text": "A2+B1", "correct": false}]}, {"id": 128, "type": "single", "chapter": "computer", "stem": "（   ）是⼈机交流的⼀种⽅式，⽤户对对话框进⾏设置，计算机就会执⾏相应的命令。", "explanation": null, "options": [{"id": "A", "text": "对话框", "correct": true}, {"id": "B", "text": "窗口", "correct": false}, {"id": "C", "text": "列表框", "correct": false}, {"id": "D", "text": "按钮", "correct": false}]}, {"id": 129, "type": "single", "chapter": "law", "stem": "固定期限劳动合同，是指用人单位与劳动者约定合同（  ）时间的劳动合同。", "explanation": null, "options": [{"id": "A", "text": "解除", "correct": false}, {"id": "B", "text": "续订", "correct": false}, {"id": "C", "text": "终止", "correct": true}, {"id": "D", "text": "中止", "correct": false}]}, {"id": 130, "type": "single", "chapter": "network", "stem": "根据《网络安全法》的规定，国家实行网络安全（   ）保护制度。", "explanation": null, "options": [{"id": "A", "text": "结构", "correct": false}, {"id": "B" B", "text": "高", "correct": true}, {"id": "C", "text": "低", "correct": false}, {"id": "D", "text": "高低都行", "correct": false}]}, {"id": 136, "type": "single", "chapter": "hardware", "stem": "8259接口芯片有（ ）个地址。", "explanation": null, "options": [{"id": "A", "text": "1", "correct": false}, {"id": "B", "text": "8", "correct": false}, {"id": "C", "text": "4", "correct": false}, {"id": "D", "text": "2", "correct": true}]}, {"id": 137, "type": "single", "chapter": "project", "stem": "不是项目的三重约束的是（）。", "explanation": null, "options": [{"id": "A", "text": "时间", "correct": false}, {"id": "B", "text": "性能", "correct": false}, {"id": "C", "text": "费用", "correct": false}, {"id": "D", "text": "质量", "correct": true}]}, {"id": 138, "type": "single", "chapter": "computer", "stem": "（）是一份正式认可项目存在的文件，并为项目目标和管理提供方向。", "explanation": null, "options": [{"id": "A", "text": "项目章程", "correct": true}, {"id": "B", "text": "合同", "correct": false}, {"id": "C", "text": "商业论证", "correct": false}, {"id": "D", "text": "项目管理计划", "correct": false}]}, {"id": 139, "type": "single", "chapter": "general", "stem": "（）是对一组满足需求固有特性的度量。", "explanation": null, "options": [{"id": "A", "text": "质量", "correct": true}, {"id": "B", "text": "需求一致性", "correct": false}, {"id": "C", "text": "适用性", "correct": false}, {"id": "D", "text": "可靠性", "correct": false}]}, {"id": 140, "type": "single", "chapter": "project", "stem": "通过估算最小任务的成本，再把所有任务的成本向上逐渐加总，从而计算出整个项目的总成本，这种方法是（）。", "explanation": null, "options": [{"id": "A", "text": "专家判断法", "correct": false}, {"id": "B", "text": "自下而上估算法", "correct": true}, {"id": "C", "text": "自上而下估算法", "correct": false}, {"id": "D", "text": "参数模型估算法", "correct": false}]}, {"id": 141, "type": "single", "chapter": "general", "stem": "面对面的互动中，大多数信息是通过（）传递的。", "explanation": {"text": "梅拉比安沟通模型（7-38-55 法则）：\n55% 信息来自肢体语言、面部表情、神态动作\n38% 来自语气、语调、语速\n7% 来自说话的文字内容\n面对面交流里占比最高的是肢体语言，所以选 C", "images": []}, "options": [{"id": "A", "text": "语音语调", "correct": false}, {"id": "B", "text": "所说的话", "correct"
