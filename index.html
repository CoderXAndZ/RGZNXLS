<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>AI训练师三级练习</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#2563eb" />

  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --primary: #2563eb;
  --primary-hover: #1d4ed8;
  --success: #16a34a;
  --error: #dc2626;
  --warning: #d97706;
  --text: #1e293b;
  --muted: #64748b;
  --border: #e2e8f0;
  --shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
  --radius: 12px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
    "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

header {
  background: linear-gradient(135deg, #1e40af 0%, #2563eb 100%);
  color: white;
  padding: 1.5rem 1rem;
  text-align: center;
  box-shadow: 0 2px 12px rgba(37, 99, 235, 0.3);
}

header h1 {
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 0.25rem;
}

header p {
  font-size: 0.875rem;
  opacity: 0.9;
}

.container {
  max-width: 860px;
  margin: 0 auto;
  padding: 1.25rem;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1.25rem;
  background: var(--card);
  padding: 0.5rem;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.tab-btn {
  flex: 1;
  padding: 0.65rem 1rem;
  border: none;
  background: transparent;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--muted);
  transition: all 0.2s;
}

.tab-btn.active {
  background: var(--primary);
  color: white;
}

.tab-btn:hover:not(.active) {
  background: var(--bg);
}

/* Toolbar */
.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  align-items: center;
  margin-bottom: 1.25rem;
  padding: 1rem;
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.toolbar label {
  font-size: 0.85rem;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 0.35rem;
}

.toolbar select {
  padding: 0.4rem 0.6rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 0.85rem;
}

.stats {
  margin-left: auto;
  font-size: 0.85rem;
  color: var(--muted);
}

.stats strong {
  color: var(--primary);
}

.stats strong.stat-good {
  color: var(--success);
}

.stats strong.stat-bad {
  color: var(--error);
}

.hint-bar {
  background: #eff6ff;
  color: #1d4ed8;
  padding: 0.55rem 1rem;
  border-radius: 8px;
  font-size: 0.82rem;
  margin-bottom: 1rem;
  text-align: center;
}

.confirm-row {
  margin-top: 0.75rem;
}

.btn-confirm {
  padding: 0.45rem 1rem;
  font-size: 0.85rem;
}

.btn-sm {
  padding: 0.25rem 0.6rem;
  font-size: 0.75rem;
}

/* 背题模式 */
.study-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1.5rem;
  margin-bottom: 1rem;
}

#study-progress {
  font-weight: 600;
  color: var(--primary);
  min-width: 5rem;
  text-align: center;
}

.study-card {
  border-left-color: var(--warning);
}

.study-option {
  cursor: default;
}

.study-option.correct-answer {
  border-color: var(--success);
  background: #f0fdf4;
}

.answer-tag {
  font-size: 0.75rem;
  color: var(--success);
  font-weight: 600;
  white-space: nowrap;
  flex-shrink: 0;
}

.study-answer-summary {
  margin-top: 1rem;
  padding: 0.65rem 0.85rem;
  background: #f0fdf4;
  border-radius: 8px;
  color: var(--success);
  font-size: 0.9rem;
  font-weight: 500;
}

#study-list-view .question-card {
  margin-bottom: 1rem;
}

/* Buttons */
.btn {
  padding: 0.55rem 1.1rem;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.875rem;
  font-weight: 500;
  transition: all 0.2s;
}

.btn-primary {
  background: var(--primary);
  color: white;
}

.btn-primary:hover {
  background: var(--primary-hover);
}

.btn-success {
  background: var(--success);
  color: white;
}

.btn-success:hover {
  filter: brightness(1.05);
}

.btn-outline {
  background: white;
  color: var(--primary);
  border: 1px solid var(--primary);
}

.btn-outline:hover {
  background: #eff6ff;
}

.btn-danger {
  background: var(--error);
  color: white;
}

.btn-danger:hover {
  filter: brightness(1.05);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Question card */
.question-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 1.25rem 1.5rem;
  margin-bottom: 1rem;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--primary);
  transition: border-color 0.3s;
}

.question-card.correct {
  border-left-color: var(--success);
}

.question-card.wrong {
  border-left-color: var(--error);
}

.question-card.unchecked {
  border-left-color: var(--border);
}

.q-header {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.75rem;
  flex-wrap: wrap;
}

.q-chapter {
  font-size: 0.72rem;
  padding: 0.15rem 0.5rem;
  border-radius: 999px;
  background: #f1f5f9;
  color: var(--muted);
  font-weight: 500;
}

.q-num {
  font-weight: 700;
  color: var(--primary);
  font-size: 0.95rem;
}

.q-type {
  font-size: 0.75rem;
  padding: 0.15rem 0.5rem;
  border-radius: 999px;
  font-weight: 500;
}

.q-type.single {
  background: #dbeafe;
  color: #1d4ed8;
}

.q-type.multiple {
  background: #fef3c7;
  color: #b45309;
}

.q-type.judgment {
  background: #dcfce7;
  color: #15803d;
}

.q-stem {
  font-size: 1rem;
  margin-bottom: 1rem;
  line-height: 1.7;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.option {
  display: flex;
  align-items: flex-start;
  gap: 0.6rem;
  padding: 0.65rem 0.85rem;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}

.option:hover:not(.disabled) {
  border-color: var(--primary);
  background: #f8fafc;
}

.option.selected {
  border-color: var(--primary);
  background: #eff6ff;
}

.option.correct-answer {
  border-color: var(--success);
  background: #f0fdf4;
}

.option.wrong-answer {
  border-color: var(--error);
  background: #fef2f2;
}

.option.disabled {
  cursor: default;
}

.option input {
  margin-top: 0.25rem;
  accent-color: var(--primary);
  flex-shrink: 0;
}

.option-label {
  font-weight: 600;
  color: var(--primary);
  min-width: 1.2rem;
}

.option-text {
  flex: 1;
}

.result-badge {
  display: none;
  margin-top: 0.75rem;
  padding: 0.5rem 0.85rem;
  border-radius: 8px;
  font-size: 0.875rem;
  font-weight: 500;
}

.result-badge.show {
  display: block;
}

.result-badge.correct {
  background: #f0fdf4;
  color: var(--success);
}

.result-badge.wrong {
  background: #fef2f2;
  color: var(--error);
}

/* Action bar */
.action-bar {
  position: sticky;
  bottom: 0;
  background: var(--card);
  padding: 1rem;
  border-radius: var(--radius);
  box-shadow: 0 -4px 24px rgba(15, 23, 42, 0.1);
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 1rem;
}

/* Summary modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.5);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}

.modal-overlay.show {
  display: flex;
}

.modal {
  background: var(--card);
  border-radius: var(--radius);
  padding: 2rem;
  max-width: 420px;
  width: 100%;
  text-align: center;
  box-shadow: var(--shadow);
}

.modal h2 {
  margin-bottom: 1rem;
  font-size: 1.25rem;
}

.modal .score {
  font-size: 3rem;
  font-weight: 800;
  color: var(--primary);
  margin: 0.5rem 0;
}

.modal .detail {
  color: var(--muted);
  margin-bottom: 1.5rem;
}

.modal-actions {
  display: flex;
  gap: 0.75rem;
  justify-content: center;
}

/* Wrong book */
.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--muted);
}

.empty-state .icon {
  font-size: 3rem;
  margin-bottom: 1rem;
}

.wrong-item {
  background: var(--card);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  margin-bottom: 0.75rem;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--error);
}

.wrong-item .meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.5rem;
  font-size: 0.8rem;
  color: var(--muted);
}

.wrong-item .stem {
  font-size: 0.95rem;
  margin-bottom: 0.5rem;
}

.wrong-item .answer-info {
  font-size: 0.85rem;
}

.wrong-item .your-ans {
  color: var(--error);
}

.wrong-item .correct-ans {
  color: var(--success);
}

.wrong-count-badge {
  background: var(--error);
  color: white;
  font-size: 0.7rem;
  padding: 0.1rem 0.45rem;
  border-radius: 999px;
  margin-left: 0.35rem;
}

.hidden {
  display: none !important;
}

.loading {
  text-align: center;
  padding: 4rem;
  color: var(--muted);
}

@media (max-width: 600px) {
  body {
    padding-bottom: env(safe-area-inset-bottom);
  }

  header {
    padding-top: max(1.25rem, env(safe-area-inset-top));
  }

  header h1 {
    font-size: 1.15rem;
  }

  .container {
    padding: 0.75rem;
  }

  .tab-btn {
    font-size: 0.82rem;
    padding: 0.55rem 0.35rem;
  }

  .toolbar {
    flex-direction: column;
    align-items: stretch;
  }

  .toolbar label {
    width: 100%;
  }

  .toolbar select {
    flex: 1;
    width: 100%;
    min-height: 44px;
    font-size: 16px;
  }

  .btn {
    min-height: 44px;
  }

  .option {
    min-height: 48px;
    padding: 0.75rem;
  }

  .stats {
    margin-left: 0;
    text-align: center;
  }

  .question-card {
    padding: 1rem;
  }

  .action-bar {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    margin: 0;
    border-radius: 0;
    padding-bottom: max(1rem, env(safe-area-inset-bottom));
    z-index: 50;
  }

  #practice-panel {
    padding-bottom: 5rem;
  }
}

<header>

        错题集

        <label>
          题型

            <option value="single">单选</option>
            <option value="multiple">多选</option>
            <option value="judgment">判断</option>
          </select>
        </label>
        <label>
          顺序
          <select id="order-filter">
            <option value="id-asc">按题号</option>
            <option value="id-desc">题号倒序</option>
            <option value="random">随机</option>
          </select>
        </label>
        <label>
          数量
          <select id="count-filter">
            <option value="all">全部 180 题</option>
            <option value="90">模拟考试 90 题</option>
            <option value="30">快速练习 30 题</option>
            <option value="10">每日 10 题</option>
          </select>
        </label>
        <button class="btn btn-outline" id="btn-shuffle">重新随机</button>
        <div class="stats">
          当前 <strong id="stat-total">0</strong> 题 ·

          错误 <strong id="stat-wrong" class="stat-bad">0</strong>
        </div>
      </div>

      <div class="hint-bar">单选/判断：点选后立即显示答案；多选：选完后点「确认答案」</div>

      <div id="question-list">
        <div class="loading">正在加载题目...</div>
      </div>

      <div class="action-bar">
        <button class="btn btn-success" id="btn-summary">查看练习统计</button>
        <button class="btn btn-outline" id="btn-reset">重新开始</button>
      </div>
    </div>

    <!-- 背题面板 -->
    <div id="study-panel" class="hidden">
      <div class="toolbar">
        <label>
          章节
          <select id="study-chapter-filter"></select>
        </label>
        <label>
          题型
          <select id="study-type-filter">
            <option value="all">全部</option>
            <option value="single">单选</option>
            <option value="multiple">多选</option>
            <option value="judgment">判断</option>
          </select>
        </label>
        <label>
          浏览
          <select id="study-view-mode">
            <option value="card">逐题浏览</option>
            <option value="list">列表全览</option>
          </select>
        </label>
        <div class="stats">
          共 <strong id="study-stat-total">0</strong> 题
        </div>
      </div>

      <div id="study-card-view">
        <div class="study-nav">
          <button class="btn btn-outline" id="study-prev">上一题</button>
          <span id="study-progress">1 / 1</span>
          <button class="btn btn-outline" id="study-next">下一题</button>
        </div>
        <div id="study-card"></div>
      </div>

      <div id="study-list-view" class="hidden"></div>
    </div>

    <!-- 错题集面板 -->
    <div id="wrongbook-panel" class="hidden">
      <div class="toolbar">
        <button class="btn btn-primary" id="btn-practice-wrong">练习全部错题</button>
        <button class="btn btn-outline" id="btn-export-wrong">导出错题集</button>
        <button class="btn btn-danger" id="btn-clear-wrong">清空错题集</button>
      </div>
      <div id="wrong-list">
        <div class="empty-state">
          <div class="icon">📚</div>
          <p>暂无错题</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 成绩弹窗 -->
  <div class="modal-overlay" id="summary-modal">
    <div class="modal">
      <h2>练习统计</h2>
      <div class="score" id="summary-score">0%</div>
      <div class="detail" id="summary-detail"></div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="btn-close-modal">继续练习</button>
        <button class="btn btn-outline" id="btn-reset-from-modal">重新开始</button>
      </div>
    </div>
  </div>

ype": "judgment", "chapter": "ethics", "stem": "执行力的定义是实现目标任务的实际程度。", "options": [{"id": "T", "text": "对", "correct": true}, {"id": "F", "text": "错", "correct": false}]}, {"id": 176, "type": "judgment", "chapter": "datastructure", "stem": "数据结构用来定义数据项之间的组合关系。", "options": [{"id": "T", "text": "对", "correct": true}, {"id": "F", "text": "错", "correct": false}]}, {"id": 177, "type": "judgment", "chapter": "python", "stem": "re.match(r'py$','puppy')返回的是一个Match对象。", "options": [{"id": "T", "text": "对", "correct": false}, {"id": "F", "text": "错", "correct": true}]}, {"id": 178, "type": "judgment", "chapter": "image", "stem": "本课程研究的图像是二维的，是三维景物在二维平面上的投影。", "options": [{"id": "T", "text": "对", "correct": true}, {"id": "F", "text": "错", "correct": false}]}, {"id": 179, "type": "judgment", "chapter": "ml_ai", "stem": "某组数据的峰态系数小于0，则并表明该组数据为扁平分布或者平峰分布。", "options": [{"id": "T", "text": "对", "correct": true}, {"id": "F", "text": "错", "correct": false}]}, {"id": 180, "type": "judgment", "chapter": "bigdata", "stem": "Topic是一种异步通信机制。", "options": [{"id": "T", "text": "对", "correct": true}, {"id": "F", "text": "错", "correct": false}]}]};
  </script>
  <script>
const STORAGE_KEY = 'ai_trainer_wrong_questions';

let allQuestions = [];
let chapters = [];
let chapterMap = {};
let currentQuestions = [];
let studyQuestions = [];
let studyIndex = 0;
let checkedMap = {}; // qid -> { correct: bool, userAnswer: [] }
let mode = 'practice';

const TYPE_LABELS = {
  single: '单选',
  multiple: '多选',
  judgment: '判断',
};

async function loadQuestionsData() {
  if (window.QUESTIONS_DATA) {
    return window.QUESTIONS_DATA;
  }
  const res = await fetch('questions.json');
  return res.json();
}

async function init() {
  try {
    const data = await loadQuestionsData();
    allQuestions = data.questions;
    chapters = data.chapters || [];
    chapterMap = Object.fromEntries(chapters.map((c) => [c.id, c.name]));

    document.getElementById('page-title').textContent = data.title;
    document.getElementById('page-subtitle').textContent =
      `共 ${data.total} 道题 · ${chapters.length} 个章节 · 单选/多选/判断`;

    populateChapterFilters();
    applyFilter();
    applyStudyFilter();
    updateWrongBadge();
  } catch (e) {
    document.getElementById('question-list').innerHTML =
      '<div class="loading">加载题目失败，请确保 questions.js 存在。<br>可运行 python3 parse_docx.py 重新生成。</div>';
  }
}

function populateChapterFilters() {
  const options =
    '<option value="all">全部章节</option>' +
    chapters
      .map((c) => {
        const count = allQuestions.filter((q) => q.chapter === c.id).length;
        return `<option value="${c.id}">${c.name}（${count}）</option>`;
      })
      .join('');

  document.getElementById('chapter-filter').innerHTML = options;
  document.getElementById('study-chapter-filter').innerHTML = options;
}

function getChapterName(id) {
  return chapterMap[id] || '综合其他';
}

function getWrongBook() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  } catch {
    return {};
  }
}

function saveWrongBook(book) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(book));
  updateWrongBadge();
}

function addToWrongBook(question, userAnswer) {
  const book = getWrongBook();
  const key = String(question.id);
  const correctIds = question.options.filter((o) => o.correct).map((o) => o.id);

  if (!book[key]) {
    book[key] = {
      questionId: question.id,
      wrongCount: 0,
      lastWrongAt: null,
      lastUserAnswer: null,
    };
  }
  book[key].wrongCount += 1;
  book[key].lastWrongAt = Date.now();
  book[key].lastUserAnswer = userAnswer;
  book[key].correctIds = correctIds;
  saveWrongBook(book);
}

function clearWrongBook() {
  if (confirm('确定清空全部错题集吗？')) {
    localStorage.removeItem(STORAGE_KEY);
    updateWrongBadge();
    if (mode === 'wrongbook') renderWrongBook();
  }
}

function updateWrongBadge() {
  const count = Object.keys(getWrongBook()).length;
  const badge = document.getElementById('wrong-badge');
  if (count > 0) {
    badge.textContent = count;
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }
}

function applyFilter() {
  const chapterFilter = document.getElementById('chapter-filter').value;
  const typeFilter = document.getElementById('type-filter').value;
  const orderFilter = document.getElementById('order-filter').value;
  const countFilter = document.getElementById('count-filter').value;

  let filtered = [...allQuestions];

  if (chapterFilter !== 'all') {
    filtered = filtered.filter((q) => q.chapter === chapterFilter);
  }
  if (typeFilter !== 'all') {
    filtered = filtered.filter((q) => q.type === typeFilter);
  }

  if (orderFilter === 'random') {
    filtered = shuffle(filtered);
  } else if (orderFilter === 'id-desc') {
    filtered.sort((a, b) => b.id - a.id);
  } else {
    filtered.sort((a, b) => a.id - b.id);
  }

  if (countFilter !== 'all') {
    filtered = filtered.slice(0, parseInt(countFilter, 10));
  }

  currentQuestions = filtered;
  checkedMap = {};
  renderQuestions();
  updateStats();
}

function applyStudyFilter() {
  const chapterFilter = document.getElementById('study-chapter-filter').value;
  const typeFilter = document.getElementById('study-type-filter').value;

  let filtered = [...allQuestions];
  if (chapterFilter !== 'all') {
    filtered = filtered.filter((q) => q.chapter === chapterFilter);
  }
  if (typeFilter !== 'all') {
    filtered = filtered.filter((q) => q.type === typeFilter);
  }
  filtered.sort((a, b) => a.id - b.id);

  studyQuestions = filtered;
  studyIndex = 0;
  document.getElementById('study-stat-total').textContent = studyQuestions.length;

  const viewMode = document.getElementById('study-view-mode').value;
  if (viewMode === 'card') {
    renderStudyCard();
  } else {
    renderStudyList();
  }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderQuestions() {
  const list = document.getElementById('question-list');
  if (currentQuestions.length === 0) {
    list.innerHTML =
      '<div class="empty-state"><div class="icon">📝</div><p>没有符合条件的题目</p></div>';
    return;
  }

  list.innerHTML = currentQuestions
    .map((q, idx) => renderQuestionCard(q, idx, false))
    .join('');

  bindQuestionEvents(list);
}

function renderQuestionCard(q, idx, showAnswer) {
  const isMultiple = q.type === 'multiple';
  const inputType = isMultiple ? 'checkbox' : 'radio';
  const name = `q-${q.id}`;
  const isChecked = !!checkedMap[q.id];
  const chapterTag = getChapterName(q.chapter);

  const optionsHtml = q.options
    .map((opt) => {
      let cls = 'option';
      if (showAnswer && opt.correct) cls += ' correct-answer';
      if (isChecked) cls += ' disabled';

      return `
        <label class="${cls}" data-qid="${q.id}" data-oid="${opt.id}">
          <input type="${inputType}" name="${name}" value="${opt.id}" ${isChecked ? 'disabled' : ''} />
          <span class="option-label">${opt.id}.</span>
          <span class="option-text">${escapeHtml(opt.text)}</span>
        </label>`;
    })
    .join('');

  const confirmBtn =
    isMultiple && !isChecked
      ? `<button class="btn btn-primary btn-confirm" data-qid="${q.id}">确认答案</button>`
      : '';

  return `
    <div class="question-card unchecked" id="card-${q.id}" data-id="${q.id}">
      <div class="q-header">
        <span class="q-num">第 ${idx + 1} 题（原题号 ${q.id}）</span>
        <span class="q-chapter">${escapeHtml(chapterTag)}</span>
        <span class="q-type ${q.type}">${TYPE_LABELS[q.type]}</span>
      </div>
      <div class="q-stem">${escapeHtml(q.stem)}</div>
      <div class="options">${optionsHtml}</div>
      ${confirmBtn ? `<div class="confirm-row">${confirmBtn}</div>` : ''}
      <div class="result-badge" id="result-${q.id}"></div>
    </div>`;
}

function bindQuestionEvents(container) {
  container.querySelectorAll('.option').forEach((el) => {
    const qid = Number(el.dataset.qid);
    const q = currentQuestions.find((x) => x.id === qid);
    if (!q || checkedMap[qid]) return;

    el.addEventListener('click', (e) => {
      if (checkedMap[qid]) return;
      const input = el.querySelector('input');
      if (e.target === input) return;
      if (input.type === 'radio') {
        input.checked = true;
        input.dispatchEvent(new Event('change', { bubbles: true }));
      } else {
        input.checked = !input.checked;
        syncOptionStyle(el.closest('.options'));
      }
    });

    el.querySelector('input').addEventListener('change', () => {
      if (checkedMap[qid]) return;
      syncOptionStyle(el.closest('.options'));
      if (q.type !== 'multiple') {
        checkQuestion(qid);
      }
    });
  });

  container.querySelectorAll('.btn-confirm').forEach((btn) => {
    btn.addEventListener('click', () => {
      checkQuestion(Number(btn.dataset.qid));
    });
  });
}

function syncOptionStyle(optionsEl) {
  optionsEl.querySelectorAll('.option').forEach((opt) => {
    opt.classList.toggle('selected', opt.querySelector('input').checked);
  });
}

function getUserAnswer(qid) {
  const inputs = document.querySelectorAll(`input[name="q-${qid}"]:checked`);
  return Array.from(inputs)
    .map((i) => i.value)
    .sort();
}

function getCorrectAnswer(q) {
  return q.options
    .filter((o) => o.correct)
    .map((o) => o.id)
    .sort();
}

function formatAnswer(q, ids) {
  return ids
    .map((id) => {
      const opt = q.options.find((o) => o.id === id);
      return opt ? `${id}. ${opt.text}` : id;
    })
    .join('；');
}

function checkQuestion(qid) {
  if (checkedMap[qid]) return;

  const q = currentQuestions.find((x) => x.id === qid);
  if (!q) return;

  const userAns = getUserAnswer(qid);
  if (userAns.length === 0) {
    if (q.type === 'multiple') {
      alert('请至少选择一个选项');
    }
    return;
  }

  const correctAns = getCorrectAnswer(q);
  const isCorrect = arraysEqual(userAns, correctAns);

  checkedMap[qid] = { correct: isCorrect, userAnswer: userAns };
  revealQuestionResult(q, userAns, isCorrect);
  updateStats();
}

function revealQuestionResult(q, userAns, isCorrect) {
  const card = document.getElementById(`card-${q.id}`);
  const resultEl = document.getElementById(`result-${q.id}`);
  const correctAns = getCorrectAnswer(q);

  card.querySelectorAll('.option').forEach((opt) => {
    opt.classList.add('disabled');
    const oid = opt.dataset.oid;
    const input = opt.querySelector('input');
    input.disabled = true;

    if (q.options.find((o) => o.id === oid)?.correct) {
      opt.classList.add('correct-answer');
    }
    if (input.checked && !q.options.find((o) => o.id === oid)?.correct) {
      opt.classList.add('wrong-answer');
    }
  });

  const confirmBtn = card.querySelector('.btn-confirm');
  if (confirmBtn) confirmBtn.remove();

  card.classList.remove('unchecked');
  card.classList.add(isCorrect ? 'correct' : 'wrong');
  resultEl.className = `result-badge show ${isCorrect ? 'correct' : 'wrong'}`;

  if (isCorrect) {
    resultEl.textContent = '✓ 回答正确';
  } else {
    resultEl.textContent = `✗ 回答错误。你的答案：${formatAnswer(q, userAns)}；正确答案：${formatAnswer(q, correctAns)}`;
    addToWrongBook(q, userAns);
  }
}

function showSummary() {
  const total = currentQuestions.length;
  const answered = Object.keys(checkedMap).length;
  let correct = 0;
  let wrong = 0;

  Object.values(checkedMap).forEach((v) => {
    if (v.correct) correct++;
    else wrong++;
  });

  const modal = document.getElementById('summary-modal');
  document.getElementById('summary-score').textContent =
    answered > 0 ? `${Math.round((correct / answered) * 100)}%` : '—';
  document.getElementById('summary-detail').textContent =
    `共 ${total} 题 · 已答 ${answered} · 正确 ${correct} · 错误 ${wrong} · 未答 ${total - answered}`;
  modal.classList.add('show');
}

function resetPractice() {
  checkedMap = {};
  document.getElementById('summary-modal').classList.remove('show');
  applyFilter();
}

/* ---------- 背题模式 ---------- */

function renderStudyCard() {
  document.getElementById('study-card-view').classList.remove('hidden');
  document.getElementById('study-list-view').classList.add('hidden');

  const cardEl = document.getElementById('study-card');
  const progressEl = document.getElementById('study-progress');

  if (studyQuestions.length === 0) {
    cardEl.innerHTML =
      '<div class="empty-state"><div class="icon">📖</div><p>没有符合条件的题目</p></div>';
    progressEl.textContent = '0 / 0';
    return;
  }

  if (studyIndex >= studyQuestions.length) studyIndex = studyQuestions.length - 1;
  if (studyIndex < 0) studyIndex = 0;

  const q = studyQuestions[studyIndex];
  progressEl.textContent = `${studyIndex + 1} / ${studyQuestions.length}`;

  cardEl.innerHTML = `
    <div class="question-card study-card">
      <div class="q-header">
        <span class="q-num">题号 ${q.id}</span>
        <span class="q-chapter">${escapeHtml(getChapterName(q.chapter))}</span>
        <span class="q-type ${q.type}">${TYPE_LABELS[q.type]}</span>
      </div>
      <div class="q-stem">${escapeHtml(q.stem)}</div>
      <div class="options">
        ${q.options
          .map(
            (opt) => `
          <div class="option study-option ${opt.correct ? 'correct-answer' : ''}">
            <span class="option-label">${opt.id}.</span>
            <span class="option-text">${escapeHtml(opt.text)}</span>
            ${opt.correct ? '<span class="answer-tag">✓ 正确答案</span>' : ''}
          </div>`
          )
          .join('')}
      </div>
      <div class="study-answer-summary">
        正确答案：${formatAnswer(q, getCorrectAnswer(q))}
      </div>
    </div>`;
}

function renderStudyList() {
  document.getElementById('study-card-view').classList.add('hidden');
  document.getElementById('study-list-view').classList.remove('hidden');

  const listEl = document.getElementById('study-list-view');

  if (studyQuestions.length === 0) {
    listEl.innerHTML =
      '<div class="empty-state"><div class="icon">📖</div><p>没有符合条件的题目</p></div>';
    return;
  }

  listEl.innerHTML = studyQuestions
    .map(
      (q, idx) => `
    <div class="question-card study-card">
      <div class="q-header">
        <span class="q-num">${idx + 1}. 题号 ${q.id}</span>
        <span class="q-chapter">${escapeHtml(getChapterName(q.chapter))}</span>
        <span class="q-type ${q.type}">${TYPE_LABELS[q.type]}</span>
      </div>
      <div class="q-stem">${escapeHtml(q.stem)}</div>
      <div class="options">
        ${q.options
          .map(
            (opt) => `
          <div class="option study-option ${opt.correct ? 'correct-answer' : ''}">
            <span class="option-label">${opt.id}.</span>
            <span class="option-text">${escapeHtml(opt.text)}</span>
            ${opt.correct ? '<span class="answer-tag">✓</span>' : ''}
          </div>`
          )
          .join('')}
      </div>
    </div>`
    )
    .join('');
}

function studyPrev() {
  if (studyIndex > 0) {
    studyIndex--;
    renderStudyCard();
  }
}

function studyNext() {
  if (studyIndex < studyQuestions.length - 1) {
    studyIndex++;
    renderStudyCard();
  }
}

/* ---------- 错题集 ---------- */

function renderWrongBook() {
  const book = getWrongBook();
  const ids = Object.keys(book).map(Number).sort((a, b) => a - b);
  const list = document.getElementById('wrong-list');

  if (ids.length === 0) {
    list.innerHTML =
      '<div class="empty-state"><div class="icon">🎉</div><p>暂无错题，继续保持！</p></div>';
    return;
  }

  list.innerHTML = ids
    .map((id) => {
      const q = allQuestions.find((x) => x.id === id);
      if (!q) return '';
      const entry = book[String(id)];
      const correctAns = getCorrectAnswer(q);
      const userAns = entry.lastUserAnswer || [];

      return `
      <div class="wrong-item" data-id="${id}">
        <div class="meta">
          <span>题号 ${id} · ${getChapterName(q.chapter)} · ${TYPE_LABELS[q.type]} · 错 ${entry.wrongCount} 次</span>
          <button class="btn btn-outline btn-sm" onclick="practiceOne(${id})">重做</button>
        </div>
        <div class="stem">${escapeHtml(q.stem)}</div>
        <div class="answer-info">
          <div class="your-ans">你的答案：${userAns.length ? formatAnswer(q, userAns) : '未作答'}</div>
          <div class="correct-ans">正确答案：${formatAnswer(q, correctAns)}</div>
        </div>
      </div>`;
    })
    .join('');
}

function practiceOne(id) {
  switchTab('practice');
  document.getElementById('chapter-filter').value = 'all';
  document.getElementById('type-filter').value = 'all';
  document.getElementById('order-filter').value = 'id-asc';
  document.getElementById('count-filter').value = 'all';

  currentQuestions = allQuestions.filter((q) => q.id === id);
  checkedMap = {};
  renderQuestions();
  updateStats();
  document.getElementById(`card-${id}`)?.scrollIntoView({ behavior: 'smooth' });
}

function practiceWrongBook() {
  const book = getWrongBook();
  const ids = new Set(Object.keys(book).map(Number));
  if (ids.size === 0) {
    alert('错题集为空');
    return;
  }
  switchTab('practice');
  document.getElementById('chapter-filter').value = 'all';
  document.getElementById('type-filter').value = 'all';
  document.getElementById('order-filter').value = 'random';
  document.getElementById('count-filter').value = 'all';
  currentQuestions = shuffle(allQuestions.filter((q) => ids.has(q.id)));
  checkedMap = {};
  renderQuestions();
  updateStats();
}

function switchTab(tab) {
  mode = tab;
  document.querySelectorAll('.tab-btn').forEach((btn) => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  document.getElementById('practice-panel').classList.toggle('hidden', tab !== 'practice');
  document.getElementById('study-panel').classList.toggle('hidden', tab !== 'study');
  document.getElementById('wrongbook-panel').classList.toggle('hidden', tab !== 'wrongbook');

  if (tab === 'wrongbook') renderWrongBook();
  if (tab === 'study') applyStudyFilter();
}

function updateStats() {
  document.getElementById('stat-total').textContent = currentQuestions.length;
  const answered = Object.keys(checkedMap).length;
  let correct = 0;
  let wrong = 0;
  Object.values(checkedMap).forEach((v) => {
    if (v.correct) correct++;
    else wrong++;
  });
  document.getElementById('stat-answered').textContent = answered;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;
}

function arraysEqual(a, b) {
  if (a.length !== b.length) return false;
  return a.every((v, i) => v === b[i]);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function exportWrongBook() {
  const book = getWrongBook();
  const ids = Object.keys(book).map(Number);
  if (ids.length === 0) {
    alert('错题集为空');
    return;
  }

  let text = '人工智能训练师三级 - 错题集\n';
  text += `导出时间：${new Date().toLocaleString('zh-CN')}\n`;
  text += `共 ${ids.length} 道错题\n`;
  text += '='.repeat(40) + '\n\n';

  ids.sort((a, b) => a - b).forEach((id, i) => {
    const q = allQuestions.find((x) => x.id === id);
    if (!q) return;
    const entry = book[String(id)];
    text += `${i + 1}. [题号${id}] [${getChapterName(q.chapter)}] [${TYPE_LABELS[q.type]}] (错${entry.wrongCount}次)\n`;
    text += `题目：${q.stem}\n`;
    q.options.forEach((o) => {
      text += `  ${o.id}. ${o.text}${o.correct ? ' ← 正确' : ''}\n`;
    });
    const userAns = entry.lastUserAnswer || [];
    text += `你的答案：${userAns.length ? formatAnswer(q, userAns) : '未作答'}\n\n`;
  });

  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `错题集_${new Date().toISOString().slice(0, 10)}.txt`;
  a.click();
}

document.addEventListener('DOMContentLoaded', () => {
  init();

  document.querySelectorAll('.tab-btn').forEach((btn) => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  document.getElementById('chapter-filter').addEventListener('change', applyFilter);
  document.getElementById('type-filter').addEventListener('change', applyFilter);
  document.getElementById('order-filter').addEventListener('change', applyFilter);
  document.getElementById('count-filter').addEventListener('change', applyFilter);

  document.getElementById('study-chapter-filter').addEventListener('change', applyStudyFilter);
  document.getElementById('study-type-filter').addEventListener('change', applyStudyFilter);
  document.getElementById('study-view-mode').addEventListener('change', applyStudyFilter);
  document.getElementById('study-prev').addEventListener('click', studyPrev);
  document.getElementById('study-next').addEventListener('click', studyNext);

  document.getElementById('btn-summary').addEventListener('click', showSummary);
  document.getElementById('btn-reset').addEventListener('click', resetPractice);
  document.getElementById('btn-shuffle').addEventListener('click', () => {
    document.getElementById('order-filter').value = 'random';
    applyFilter();
  });

  document.getElementById('btn-close-modal').addEventListener('click', () => {
    document.getElementById('summary-modal').classList.remove('show');
  });
  document.getElementById('btn-reset-from-modal').addEventListener('click', resetPractice);

  document.getElementById('btn-practice-wrong').addEventListener('click', practiceWrongBook);
  document.getElementById('btn-export-wrong').addEventListener('click', exportWrongBook);
  document.getElementById('btn-clear-wrong').addEventListener('click', clearWrongBook);
});

window.practiceOne = practiceOne;
